<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura · Wellness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ══════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════ */
:root {
  /* Colors */
  --ink: #0c0d11;
  --ink2: #1a1c25;
  --ink3: #2d2f3e;
  --mist: #f4f3f0;
  --mist2: #eceae6;
  --mist3: #dddad4;
  --paper: #faf9f7;
  --cream: #f7f5f1;
  --fog: rgba(12,13,17,0.06);

  --teal: #00c9a7;
  --teal-dim: rgba(0,201,167,0.12);
  --teal-glow: rgba(0,201,167,0.35);
  --violet: #7b5ea7;
  --violet-dim: rgba(123,94,167,0.12);
  --amber: #f0a500;
  --amber-dim: rgba(240,165,0,0.12);
  --coral: #ff6b6b;
  --coral-dim: rgba(255,107,107,0.12);
  --sky: #4facfe;
  --sky-dim: rgba(79,172,254,0.12);

  --border: rgba(12,13,17,0.08);
  --border-strong: rgba(12,13,17,0.14);

  --r-sm: 10px;
  --r: 16px;
  --r-lg: 22px;
  --r-xl: 32px;
  --r-pill: 999px;

  --shadow-sm: 0 1px 3px rgba(12,13,17,0.06), 0 1px 2px rgba(12,13,17,0.04);
  --shadow: 0 4px 16px rgba(12,13,17,0.07), 0 1px 4px rgba(12,13,17,0.05);
  --shadow-lg: 0 12px 40px rgba(12,13,17,0.10), 0 4px 12px rgba(12,13,17,0.06);
  --shadow-xl: 0 24px 64px rgba(12,13,17,0.13), 0 8px 24px rgba(12,13,17,0.08);

  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  --transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  --spring: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);

  /* ── FLUID TYPOGRAPHY SCALE ──
     Clamp format: clamp(min, preferred, max)
     preferred = viewport-relative calc for smooth scaling
  */
  --text-xs:   clamp(0.625rem, 0.58rem + 0.2vw, 0.6875rem);   /* 10–11px */
  --text-sm:   clamp(0.6875rem, 0.64rem + 0.22vw, 0.8125rem); /* 11–13px */
  --text-base: clamp(0.8125rem, 0.76rem + 0.24vw, 0.9375rem); /* 13–15px */
  --text-md:   clamp(0.875rem, 0.82rem + 0.26vw, 1rem);       /* 14–16px */
  --text-lg:   clamp(1rem, 0.92rem + 0.38vw, 1.25rem);        /* 16–20px */
  --text-xl:   clamp(1.125rem, 1rem + 0.6vw, 1.5rem);         /* 18–24px */
  --text-2xl:  clamp(1.25rem, 1.1rem + 0.72vw, 1.75rem);      /* 20–28px */
  --text-3xl:  clamp(1.5rem, 1.25rem + 1.2vw, 2.25rem);       /* 24–36px */
  --text-4xl:  clamp(1.75rem, 1.4rem + 1.6vw, 2.75rem);       /* 28–44px */
  --text-hero: clamp(2rem, 1.6rem + 2vw, 3.5rem);             /* 32–56px */
  --text-giant:clamp(2.25rem, 1.6rem + 3.2vw, 4.5rem);        /* 36–72px */

  /* ── FLUID SPACING SCALE ── */
  --space-1: clamp(0.25rem, 0.22rem + 0.13vw, 0.375rem);
  --space-2: clamp(0.375rem, 0.34rem + 0.17vw, 0.5rem);
  --space-3: clamp(0.5rem, 0.44rem + 0.28vw, 0.75rem);
  --space-4: clamp(0.75rem, 0.66rem + 0.42vw, 1rem);
  --space-5: clamp(1rem, 0.88rem + 0.56vw, 1.375rem);
  --space-6: clamp(1.25rem, 1.1rem + 0.7vw, 1.75rem);
  --space-7: clamp(1.5rem, 1.3rem + 0.94vw, 2.25rem);
  --space-8: clamp(1.75rem, 1.5rem + 1.2vw, 2.75rem);
  --space-9: clamp(2rem, 1.7rem + 1.4vw, 3.25rem);
  --space-10:clamp(2.5rem, 2rem + 2.4vw, 4.5rem);

  /* ── LAYOUT ── */
  --content-max: 960px;
  --content-padding: clamp(1rem, 4vw, 1.5rem);
  --topbar-height: clamp(52px, 8vw, 64px);
}

/* ── DARK MODE ── */
@media (prefers-color-scheme: dark) {
  :root {
    --ink: #f0ede8;
    --ink2: #d4cfc8;
    --ink3: #9e9892;
    --mist: #1c1b20;
    --mist2: #242329;
    --mist3: #2e2d34;
    --paper: #17161b;
    --cream: #1c1b20;
    --fog: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.12);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
    --shadow: 0 4px 16px rgba(0,0,0,0.4);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
    --shadow-xl: 0 24px 64px rgba(0,0,0,0.6);
  }
}

/* ══════════════════════════════════════
   RESET & BASE
══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  font-size: var(--text-base);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  /* Prevent text size adjustment on orientation change */
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

/* Prevent font blowup on large viewports */
@media (min-width: 1600px) {
  body { font-size: 0.9375rem; }
}

/* ── NOISE OVERLAY ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: 0.4; pointer-events: none; z-index: 9999;
}

/* ── ANIMATED BG ORBS ── */
.bg-orbs { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
.orb {
  position: absolute; border-radius: 50%;
  filter: blur(80px);
  animation: drift 18s ease-in-out infinite;
  /* Prevent orbs from affecting layout calculations */
  will-change: transform;
}
.orb1 { width: clamp(280px, 40vw, 500px); height: clamp(280px, 40vw, 500px); background: radial-gradient(circle,rgba(0,201,167,0.07),transparent 70%); top: -100px; right: -100px; animation-delay: 0s; }
.orb2 { width: clamp(320px, 48vw, 600px); height: clamp(320px, 48vw, 600px); background: radial-gradient(circle,rgba(123,94,167,0.05),transparent 70%); bottom: -150px; left: -150px; animation-delay: -6s; }
.orb3 { width: clamp(160px, 24vw, 300px); height: clamp(160px, 24vw, 300px); background: radial-gradient(circle,rgba(240,165,0,0.06),transparent 70%); top: 40%; left: 30%; animation-delay: -12s; }

@keyframes drift {
  0%,100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(40px,-30px) scale(1.05); }
  66% { transform: translate(-20px,20px) scale(0.97); }
}

/* ══════════════════════════════════════
   FORM ELEMENTS
══════════════════════════════════════ */
input, select, textarea {
  font-family: var(--font-body);
  font-size: var(--text-base);
  padding: clamp(0.625rem, 1.5vw, 0.875rem) clamp(0.75rem, 2vw, 1rem);
  border-radius: var(--r);
  border: 1.5px solid var(--border-strong);
  background: var(--mist);
  color: var(--ink);
  outline: none;
  width: 100%;
  transition: var(--transition);
  /* Prevent zoom on iOS */
  font-size: max(16px, var(--text-base));
}
@media (min-width: 480px) {
  input, select, textarea { font-size: var(--text-base); }
}
input:focus, select:focus {
  border-color: var(--teal);
  background: var(--paper);
  box-shadow: 0 0 0 4px var(--teal-dim), var(--shadow-sm);
}
input::placeholder { color: var(--ink3); }

button {
  font-family: var(--font-body);
  cursor: pointer;
  border: none;
  transition: var(--transition);
  /* Prevent text from being cut off */
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
button:active { transform: scale(0.96) !important; }

/* ══════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════ */
@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
@keyframes slideIn { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:none; } }
@keyframes scaleIn { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes shimmer { 0% { background-position:-400px 0; } 100% { background-position:400px 0; } }
@keyframes countUp { from { transform:translateY(8px); opacity:0; } to { transform:none; opacity:1; } }
@keyframes glow { 0%,100% { box-shadow:0 0 20px var(--teal-glow); } 50% { box-shadow:0 0 40px var(--teal-glow),0 0 60px var(--teal-dim); } }
@keyframes wave { 0%,100% { transform:scaleY(1); } 50% { transform:scaleY(0.4); } }
@keyframes celebrate { 0% { transform:scale(1); } 50% { transform:scale(1.15); } 100% { transform:scale(1); } }

.fade { animation: fadeUp 0.4s cubic-bezier(0.16,1,0.3,1); }
.scale-in { animation: scaleIn 0.3s cubic-bezier(0.16,1,0.3,1); }
.spinner {
  width: clamp(18px, 3vw, 22px);
  height: clamp(18px, 3vw, 22px);
  border: 2.5px solid var(--border-strong);
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--mist3); border-radius: 4px; }

/* ══════════════════════════════════════
   AUTH PAGE
══════════════════════════════════════ */
.auth-scene {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-6);
  position: relative;
}

.auth-wrap {
  width: 100%;
  max-width: min(420px, 100%);
  position: relative;
  z-index: 1;
}

.auth-brand {
  text-align: center;
  margin-bottom: var(--space-8);
}
.auth-brand-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: clamp(52px, 10vw, 64px);
  height: clamp(52px, 10vw, 64px);
  border-radius: 20px;
  margin: 0 auto var(--space-4);
  position: relative;
  overflow: hidden;
  background: var(--ink);
}
.auth-brand-mark::after {
  content: '🌿';
  font-size: clamp(22px, 4vw, 28px);
  position: relative; z-index: 1;
}
.auth-brand-name {
  font-family: var(--font-display);
  font-size: var(--text-3xl);
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--ink);
}
.auth-brand-sub {
  font-size: var(--text-sm);
  color: var(--ink3);
  margin-top: var(--space-1);
}

.auth-card {
  background: var(--paper);
  border: 1.5px solid var(--border-strong);
  border-radius: var(--r-xl);
  padding: clamp(1.25rem, 5vw, 2rem);
  box-shadow: var(--shadow-xl);
  backdrop-filter: blur(12px);
}

.auth-mode-title {
  font-family: var(--font-display);
  font-size: var(--text-2xl);
  font-weight: 700;
  margin-bottom: var(--space-1);
}
.auth-mode-sub {
  font-size: var(--text-sm);
  color: var(--ink3);
  margin-bottom: var(--space-7);
}

.field {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  margin-bottom: var(--space-4);
}
.label {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--ink3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-family: var(--font-display);
}

.auth-alert {
  padding: clamp(0.625rem, 2vw, 0.875rem) clamp(0.75rem, 2vw, 1rem);
  border-radius: var(--r);
  font-size: var(--text-sm);
  margin-bottom: var(--space-5);
  display: flex; align-items: center; gap: var(--space-3);
  background: rgba(255,107,107,0.10);
  color: var(--coral);
  border: 1.5px solid rgba(255,107,107,0.25);
}

.auth-footer {
  display: flex; gap: var(--space-2); flex-wrap: wrap; justify-content: center;
  padding-top: var(--space-5);
  border-top: 1px solid var(--border);
  margin-top: var(--space-5);
}
.auth-link {
  font-size: var(--text-sm);
  color: var(--ink3);
  background: none;
  padding: var(--space-1) var(--space-3);
  border-radius: var(--r-pill);
  font-weight: 500;
  border: none;
  transition: var(--transition);
}
.auth-link:hover { color: var(--teal); background: var(--teal-dim); }
.auth-link-violet { color: var(--violet) !important; }
.auth-link-violet:hover { background: var(--violet-dim) !important; color: var(--violet) !important; }

/* ══════════════════════════════════════
   BUTTONS
══════════════════════════════════════ */
.btn {
  padding: clamp(0.625rem, 2vw, 0.875rem) clamp(1rem, 3vw, 1.5rem);
  border-radius: var(--r);
  font-size: var(--text-base);
  font-weight: 600;
  font-family: var(--font-display);
  display: inline-flex; align-items: center; justify-content: center; gap: var(--space-3);
  cursor: pointer; border: none;
  letter-spacing: 0.01em;
  transition: var(--transition);
  flex-shrink: 0;
}
.btn:hover { transform: translateY(-2px); }
.btn-full { width: 100%; }
.btn-sm {
  padding: clamp(0.4rem, 1.2vw, 0.5625rem) clamp(0.75rem, 2vw, 1rem);
  font-size: var(--text-sm);
  border-radius: var(--r-sm);
}

.btn-primary { background: var(--ink); color: var(--paper); }
.btn-primary:hover { background: var(--ink2); box-shadow: var(--shadow-lg); }

.btn-teal { background: var(--teal); color: #fff; }
.btn-teal:hover { background: #00b898; box-shadow: 0 8px 24px var(--teal-glow); }

.btn-ghost {
  background: var(--mist);
  color: var(--ink);
  border: 1.5px solid var(--border-strong);
}
.btn-ghost:hover { background: var(--mist2); border-color: var(--teal); color: var(--teal); }

.btn-violet { background: var(--violet); color: #fff; }
.btn-violet:hover { box-shadow: 0 8px 24px rgba(123,94,167,0.4); }

/* ══════════════════════════════════════
   APP SHELL
══════════════════════════════════════ */
.app-shell {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ── TOPBAR ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,249,247,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
@media (prefers-color-scheme: dark) {
  .topbar { background: rgba(23,22,27,0.85); }
}

.topbar-inner {
  max-width: var(--content-max);
  margin: 0 auto;
  padding: 0 var(--content-padding);
  display: flex; align-items: center; justify-content: space-between;
  height: var(--topbar-height);
  gap: var(--space-3);
}

.topbar-brand {
  display: flex; align-items: center; gap: clamp(0.5rem, 1.5vw, 0.75rem);
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: 800;
  letter-spacing: -0.3px;
  flex-shrink: 0;
}
.topbar-icon {
  width: clamp(28px, 5vw, 32px);
  height: clamp(28px, 5vw, 32px);
  background: var(--ink);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(13px, 2.5vw, 15px);
  flex-shrink: 0;
}

.topbar-right {
  display: flex; align-items: center;
  gap: clamp(0.375rem, 1.5vw, 0.75rem);
  overflow: hidden;
  min-width: 0;
}

/* ── STREAK BADGE ── */
.streak-badge {
  display: inline-flex; align-items: center; gap: var(--space-2);
  padding: var(--space-1) clamp(0.5rem, 2vw, 0.875rem);
  border-radius: var(--r-pill);
  background: linear-gradient(135deg,rgba(240,165,0,0.12),rgba(255,107,107,0.08));
  border: 1px solid rgba(240,165,0,0.25);
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--amber);
  font-family: var(--font-display);
  white-space: nowrap;
}

.user-chip {
  padding: var(--space-1) clamp(0.625rem, 2vw, 1rem);
  border-radius: var(--r-pill);
  background: var(--mist);
  border: 1.5px solid var(--border-strong);
  font-size: var(--text-sm);
  font-weight: 600;
  font-family: var(--font-display);
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: clamp(80px, 20vw, 160px);
}

.sign-out-btn {
  background: none; border: none;
  font-size: var(--text-xs);
  color: var(--ink3);
  padding: var(--space-1) var(--space-3);
  border-radius: var(--r-sm);
  font-weight: 500;
  white-space: nowrap;
}
.sign-out-btn:hover { color: var(--coral); background: var(--coral-dim); }

/* ── NAV ── */
.nav-bar { border-bottom: 1px solid var(--border); overflow: hidden; }
.nav-bar-inner {
  max-width: var(--content-max);
  margin: 0 auto;
  padding: 0 var(--content-padding);
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.nav-bar-inner::-webkit-scrollbar { display: none; }

.nav-tab {
  padding: clamp(0.75rem, 2vw, 1rem) clamp(0.75rem, 2.5vw, 1.25rem);
  font-size: var(--text-sm);
  font-weight: 600;
  font-family: var(--font-display);
  background: none; border: none;
  border-bottom: 2.5px solid transparent;
  cursor: pointer; white-space: nowrap;
  color: var(--ink3);
  display: flex; align-items: center; gap: var(--space-2);
  transition: var(--transition);
  position: relative;
  flex-shrink: 0;
}
.nav-tab:hover { color: var(--ink); }
.nav-tab.active { color: var(--teal); border-bottom-color: var(--teal); }
.nav-tab-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0;
  transition: var(--transition);
}
.nav-tab.active .nav-tab-dot { opacity: 1; }

/* ── MAIN CONTENT WRAP ── */
.main-wrap {
  max-width: var(--content-max);
  margin: 0 auto;
  padding: var(--space-7) var(--content-padding) clamp(4rem, 10vw, 6rem);
  width: 100%;
  position: relative; z-index: 1;
}

/* ── ULTRAWIDE CONSTRAINT ── */
@media (min-width: 1400px) {
  .main-wrap { max-width: 1080px; }
}
@media (min-width: 1800px) {
  .main-wrap { max-width: 1100px; padding-left: 2rem; padding-right: 2rem; }
  .topbar-inner, .nav-bar-inner { max-width: 1100px; }
}

/* ══════════════════════════════════════
   CARDS
══════════════════════════════════════ */
.card {
  background: var(--paper);
  border: 1.5px solid var(--border-strong);
  border-radius: var(--r-lg);
  padding: clamp(1rem, 3.5vw, 1.5rem);
  box-shadow: var(--shadow);
  transition: var(--transition);
}
.card-hover:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
  border-color: var(--teal);
}
.card-sm { padding: clamp(0.75rem, 2.5vw, 1.125rem) clamp(0.875rem, 2.5vw, 1.25rem); }
.card-xs { padding: clamp(0.625rem, 2vw, 0.875rem) clamp(0.75rem, 2vw, 1rem); }

/* glass card */
.glass-card {
  background: rgba(250,249,247,0.6);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1.5px solid var(--border-strong);
  border-radius: var(--r-lg);
  padding: clamp(1rem, 3.5vw, 1.5rem);
  box-shadow: var(--shadow);
}
@media (prefers-color-scheme: dark) {
  .glass-card { background: rgba(28,27,32,0.7); }
}

/* accent cards */
.card-teal {
  background: linear-gradient(135deg,rgba(0,201,167,0.08),rgba(79,172,254,0.05));
  border-color: rgba(0,201,167,0.2);
}
.card-violet {
  background: linear-gradient(135deg,rgba(123,94,167,0.08),rgba(79,172,254,0.05));
  border-color: rgba(123,94,167,0.2);
}
.card-amber {
  background: linear-gradient(135deg,rgba(240,165,0,0.08),rgba(255,107,107,0.05));
  border-color: rgba(240,165,0,0.2);
}

/* ══════════════════════════════════════
   SECTION HEADERS & TYPOGRAPHY
══════════════════════════════════════ */
.s-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: var(--space-5);
  gap: var(--space-3);
}
.s-title {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: 700;
  letter-spacing: -0.3px;
  line-height: 1.2;
}
.s-sub { font-size: var(--text-sm); color: var(--ink3); margin-top: var(--space-1); }
.s-action {
  font-size: var(--text-sm);
  color: var(--teal); font-weight: 600;
  background: none; border: none; cursor: pointer;
  font-family: var(--font-display);
  flex-shrink: 0;
}

/* ── LAYOUT UTILITIES ── */
.col { display: flex; flex-direction: column; gap: var(--space-5); }
.row { display: flex; align-items: center; gap: var(--space-3); }

/* Responsive 2-col grid */
.g2 {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: clamp(0.5rem, 2vw, 0.875rem);
}
@media (max-width: 360px) {
  .g2 { grid-template-columns: 1fr; }
}

/* Responsive 3-col grid */
.g3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: clamp(0.5rem, 2vw, 0.875rem);
}
@media (max-width: 540px) {
  .g3 { grid-template-columns: repeat(2, 1fr); }
}

/* Auto-fit grid */
.g-auto {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(min(140px, 100%), 1fr));
  gap: clamp(0.5rem, 2vw, 0.875rem);
}

/* ══════════════════════════════════════
   PILLS / TAGS
══════════════════════════════════════ */
.pill {
  display: inline-flex; align-items: center; gap: var(--space-1);
  padding: var(--space-1) clamp(0.5rem, 1.5vw, 0.8125rem);
  border-radius: var(--r-pill);
  font-size: var(--text-xs);
  font-weight: 600;
  font-family: var(--font-display);
}
.pill-teal { background: var(--teal-dim); color: var(--teal); border: 1px solid rgba(0,201,167,0.25); }
.pill-violet { background: var(--violet-dim); color: var(--violet); border: 1px solid rgba(123,94,167,0.25); }
.pill-amber { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(240,165,0,0.25); }
.pill-coral { background: var(--coral-dim); color: var(--coral); border: 1px solid rgba(255,107,107,0.25); }
.pill-sky { background: var(--sky-dim); color: var(--sky); border: 1px solid rgba(79,172,254,0.25); }
.pill-neutral { background: var(--mist); color: var(--ink3); border: 1px solid var(--border-strong); }

/* ══════════════════════════════════════
   PROGRESS BARS
══════════════════════════════════════ */
.progress-track {
  height: 6px;
  background: var(--mist2);
  border-radius: var(--r-pill);
  overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: var(--r-pill);
  transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
  position: relative; overflow: hidden;
}
.progress-fill::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.4) 50%,transparent 100%);
  animation: shimmer 2s infinite;
  background-size: 400px 100%;
}

/* ══════════════════════════════════════
   DASHBOARD
══════════════════════════════════════ */

/* Hero greeting */
.hero {
  position: relative;
  border-radius: var(--r-xl);
  padding: clamp(1.25rem, 5vw, 2.25rem) clamp(1.25rem, 5vw, 2rem);
  overflow: hidden;
  background: var(--ink);
  color: var(--paper);
  margin-bottom: var(--space-5);
}
.hero-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 80% 50%,rgba(0,201,167,0.2) 0%,transparent 60%),
              radial-gradient(ellipse at 20% 80%,rgba(123,94,167,0.15) 0%,transparent 50%);
}
.hero-streak {
  display: inline-flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) clamp(0.625rem, 2vw, 1rem);
  border-radius: var(--r-pill);
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  font-size: var(--text-xs);
  font-weight: 600;
  font-family: var(--font-display);
  margin-bottom: var(--space-4);
  color: var(--amber);
  backdrop-filter: blur(8px);
}
.hero-name {
  font-family: var(--font-display);
  font-size: clamp(1.5rem, 3.5vw + 0.5rem, 2.25rem);
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1.1;
  margin-bottom: var(--space-2);
  position: relative; z-index: 1;
  /* Prevent overflow */
  overflow-wrap: break-word;
  word-break: break-word;
}
.hero-date {
  font-size: var(--text-sm);
  opacity: 0.6;
  position: relative; z-index: 1;
}
.hero-ring {
  position: absolute;
  right: clamp(1rem, 4vw, 1.75rem);
  top: 50%;
  transform: translateY(-50%);
}

/* Ring progress */
.ring-svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: rgba(255,255,255,0.08); }
.ring-fill {
  fill: none; stroke: var(--teal); stroke-linecap: round;
  transition: stroke-dashoffset 1s cubic-bezier(0.16,1,0.3,1);
  filter: drop-shadow(0 0 6px var(--teal));
}
.ring-label {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: var(--font-display);
  color: #fff;
}
.ring-val {
  font-size: clamp(1.125rem, 3vw, 1.5rem);
  font-weight: 700;
  line-height: 1;
}
.ring-unit { font-size: var(--text-xs); opacity: 0.6; margin-top: var(--space-1); }

/* Stat items */
.stat-row {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: clamp(0.5rem, 2vw, 0.75rem);
}
.stat-item {
  background: var(--mist);
  border: 1.5px solid var(--border-strong);
  border-radius: var(--r-lg);
  padding: clamp(0.875rem, 3vw, 1.125rem);
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.stat-item::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--accent-color, var(--teal));
  border-radius: var(--r-lg) var(--r-lg) 0 0;
  transform: scaleX(var(--accent-scale, 0));
  transition: transform 0.6s cubic-bezier(0.16,1,0.3,1);
  transform-origin: left;
}
.stat-item:hover::before { transform: scaleX(1); }
.stat-item:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--accent-color, var(--teal)); }
.stat-num {
  font-family: var(--font-display);
  font-size: clamp(1.375rem, 3.5vw, 1.875rem);
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--accent-color, var(--teal));
  line-height: 1.1;
  animation: countUp 0.5s ease;
  overflow: hidden;
  text-overflow: ellipsis;
}
.stat-desc { font-size: var(--text-xs); color: var(--ink3); margin-top: var(--space-1); }
.stat-name {
  font-size: var(--text-xs);
  font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--ink3);
  margin-top: var(--space-3);
  font-family: var(--font-display);
}

/* Quick actions */
.quick-actions {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: clamp(0.5rem, 2vw, 0.75rem);
}
.qa-btn {
  padding: clamp(0.75rem, 2.5vw, 1rem) clamp(0.75rem, 2.5vw, 1rem);
  border-radius: var(--r-lg);
  display: flex; align-items: center;
  gap: clamp(0.5rem, 1.5vw, 0.75rem);
  font-size: var(--text-sm);
  font-weight: 600;
  font-family: var(--font-display);
  cursor: pointer;
  border: 1.5px solid var(--border-strong);
  transition: var(--transition);
  background: var(--mist);
  color: var(--ink);
  white-space: normal;
  word-break: break-word;
  text-align: left;
}
.qa-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--teal); color: var(--teal); }
.qa-icon {
  width: clamp(28px, 5vw, 36px);
  height: clamp(28px, 5vw, 36px);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(14px, 2.5vw, 18px);
  flex-shrink: 0;
}

/* ══════════════════════════════════════
   HYDRATION
══════════════════════════════════════ */
.water-hero {
  background: linear-gradient(135deg, var(--ink) 0%, #1a2f40 100%);
  border-radius: var(--r-xl);
  padding: clamp(1.25rem, 5vw, 2rem);
  position: relative; overflow: hidden;
  color: #fff;
  margin-bottom: var(--space-4);
}
.water-hero::before {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 60%;
  background: linear-gradient(180deg, transparent, rgba(0,201,167,0.08));
}
.water-pct {
  font-family: var(--font-display);
  font-size: clamp(2.25rem, 8vw, 4rem);
  font-weight: 800;
  letter-spacing: -3px;
  line-height: 1;
  color: var(--teal);
  filter: drop-shadow(0 0 20px var(--teal-glow));
}
.water-label { font-size: var(--text-sm); opacity: 0.6; margin-top: var(--space-1); }
.water-glasses-display {
  display: flex; align-items: center; flex-wrap: wrap; gap: var(--space-2);
  margin-top: var(--space-4);
}
.glass-dot {
  width: clamp(8px, 1.5vw, 10px);
  height: clamp(8px, 1.5vw, 10px);
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  transition: var(--transition);
}
.glass-dot.filled { background: var(--teal); box-shadow: 0 0 8px var(--teal-glow); }

/* Glass grid */
.glass-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: clamp(0.25rem, 1.2vw, 0.5rem);
  margin: var(--space-4) 0;
}
@media (max-width: 360px) {
  .glass-grid { grid-template-columns: repeat(4, 1fr); }
}
.glass-item {
  aspect-ratio: 3/4;
  border-radius: 4px 4px 10px 10px;
  border: 1.5px solid var(--border-strong);
  background: var(--mist);
  cursor: pointer;
  transition: var(--spring);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(12px, 2.5vw, 16px);
  position: relative; overflow: hidden;
}
.glass-item::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 0%;
  background: linear-gradient(180deg,rgba(0,201,167,0.3),rgba(0,201,167,0.7));
  transition: height 0.4s cubic-bezier(0.16,1,0.3,1);
}
.glass-item.filled { border-color: rgba(0,201,167,0.4); background: rgba(0,201,167,0.08); }
.glass-item.filled::after { height: 100%; }
.glass-item:hover { transform: scale(1.1); }
.glass-item .gi-emoji { position: relative; z-index: 1; }

.water-ctrls { display: flex; gap: clamp(0.5rem, 2vw, 0.75rem); margin-top: var(--space-2); }
.water-dec-btn {
  width: clamp(42px, 8vw, 52px);
  height: clamp(42px, 8vw, 52px);
  flex-shrink: 0;
  border-radius: var(--r);
  border: 1.5px solid var(--border-strong);
  background: var(--mist); color: var(--ink);
  font-size: clamp(18px, 3vw, 22px);
  font-weight: 300;
  display: flex; align-items: center; justify-content: center;
}
.water-dec-btn:hover { border-color: var(--coral); color: var(--coral); background: var(--coral-dim); }

/* ══════════════════════════════════════
   MEALS
══════════════════════════════════════ */
.meal-type-tabs {
  display: flex; gap: var(--space-2); flex-wrap: wrap;
  margin-bottom: var(--space-4);
}
.meal-type-tab {
  padding: var(--space-2) clamp(0.75rem, 2.5vw, 1rem);
  border-radius: var(--r-pill);
  font-size: var(--text-xs);
  font-weight: 600;
  font-family: var(--font-display);
  border: 1.5px solid var(--border-strong);
  background: var(--mist); color: var(--ink3);
  cursor: pointer; transition: var(--transition);
  flex-shrink: 0;
}
.meal-type-tab.active, .meal-type-tab:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

.meal-card {
  display: flex; align-items: center;
  gap: clamp(0.625rem, 2vw, 1rem);
  padding: clamp(0.75rem, 2.5vw, 1rem) clamp(0.75rem, 2.5vw, 1.125rem);
  border: 1.5px solid var(--border);
  border-radius: var(--r-lg);
  background: var(--mist);
  margin-bottom: var(--space-3);
  transition: var(--transition);
  animation: slideIn 0.25s ease;
  min-width: 0;
}
.meal-card:hover { border-color: var(--teal); background: var(--teal-dim); }
.meal-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--teal); flex-shrink: 0; }
.meal-info { flex: 1; min-width: 0; }
.meal-name { font-weight: 600; font-size: var(--text-base); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.meal-meta { font-size: var(--text-xs); color: var(--ink3); margin-top: var(--space-1); }
.meal-cal { font-family: var(--font-mono); font-size: var(--text-base); color: var(--teal); font-weight: 500; white-space: nowrap; flex-shrink: 0; }
.rm-btn {
  font-size: var(--text-xs);
  color: var(--coral);
  background: var(--coral-dim);
  border: 1px solid rgba(255,107,107,0.25);
  border-radius: 6px;
  padding: var(--space-1) var(--space-3);
  font-weight: 600; flex-shrink: 0;
  white-space: nowrap;
}
.rm-btn:hover { background: var(--coral); color: #fff; }

/* Calorie bar */
.cal-bar-wrap {
  background: var(--mist2);
  border-radius: var(--r-lg);
  padding: clamp(0.875rem, 3vw, 1.125rem);
  margin-bottom: var(--space-4);
}
.cal-nums {
  display: flex; justify-content: space-between;
  font-family: var(--font-display);
  font-size: var(--text-sm); font-weight: 600;
  margin-bottom: var(--space-3);
  gap: var(--space-3);
}
.cal-num-main {
  font-size: clamp(1.5rem, 4vw, 2rem);
  letter-spacing: -0.5px;
  line-height: 1;
}

/* ══════════════════════════════════════
   EXERCISE
══════════════════════════════════════ */
.ex-preset-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(120px, 100%), 1fr));
  gap: clamp(0.375rem, 1.5vw, 0.625rem);
  margin-bottom: var(--space-5);
}
.ex-preset-chip {
  padding: clamp(0.5rem, 2vw, 0.75rem) clamp(0.625rem, 2vw, 1rem);
  border-radius: var(--r);
  font-size: var(--text-xs);
  font-weight: 600;
  font-family: var(--font-display);
  background: var(--mist);
  border: 1.5px solid var(--border-strong);
  color: var(--ink);
  cursor: pointer; transition: var(--transition);
  display: flex; align-items: center; gap: var(--space-3);
}
.ex-preset-chip:hover {
  background: rgba(0,201,167,0.1);
  border-color: var(--teal); color: var(--teal);
  transform: translateY(-2px); box-shadow: var(--shadow);
}
.ex-preset-chip.selected { background: var(--teal); border-color: var(--teal); color: #fff; box-shadow: 0 4px 16px var(--teal-glow); }

.ex-card {
  display: flex; align-items: center;
  gap: clamp(0.625rem, 2vw, 1rem);
  padding: clamp(0.75rem, 2.5vw, 1rem) clamp(0.75rem, 2.5vw, 1.125rem);
  border: 1.5px solid var(--border);
  border-radius: var(--r-lg);
  background: var(--mist);
  margin-bottom: var(--space-3);
  animation: slideIn 0.25s ease;
  transition: var(--transition);
  min-width: 0;
}
.ex-card:hover { border-color: var(--teal); }
.ex-icon {
  width: clamp(34px, 6vw, 42px);
  height: clamp(34px, 6vw, 42px);
  border-radius: 12px;
  background: var(--teal-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(14px, 2.5vw, 18px);
  flex-shrink: 0;
}
.ex-info { flex: 1; min-width: 0; }
.ex-name { font-weight: 600; font-size: var(--text-base); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ex-meta { font-size: var(--text-xs); color: var(--ink3); margin-top: var(--space-1); }
.ex-stats { text-align: right; flex-shrink: 0; }
.ex-dur { font-family: var(--font-display); font-size: var(--text-lg); font-weight: 700; color: var(--teal); }
.ex-cal-text { font-size: var(--text-xs); color: var(--ink3); }

/* Total exercise band */
.ex-total-band {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 1px;
  background: var(--border-strong);
  border-radius: var(--r-lg);
  overflow: hidden;
  margin-bottom: var(--space-4);
}
.ex-band-item { background: var(--mist); padding: clamp(0.75rem, 2.5vw, 1rem); text-align: center; }
.ex-band-val {
  font-family: var(--font-display);
  font-size: clamp(1.125rem, 3vw, 1.5rem);
  font-weight: 700; color: var(--teal);
}
.ex-band-lbl {
  font-size: var(--text-xs);
  color: var(--ink3); text-transform: uppercase;
  letter-spacing: 0.08em; margin-top: var(--space-1);
  font-weight: 600;
}

/* ══════════════════════════════════════
   BMI
══════════════════════════════════════ */
.bmi-display {
  text-align: center;
  padding: clamp(1.25rem, 5vw, 2.25rem);
  border-radius: var(--r-xl);
  margin-bottom: var(--space-4);
  position: relative; overflow: hidden;
}
.bmi-number {
  font-family: var(--font-display);
  font-size: clamp(3rem, 10vw, 5rem);
  font-weight: 800;
  letter-spacing: -4px;
  line-height: 1;
  position: relative; z-index: 1;
}
.bmi-range-track {
  position: relative; height: 8px;
  border-radius: var(--r-pill);
  background: linear-gradient(90deg,#4facfe,#00c9a7,#f0a500,#ff6b6b);
  margin: var(--space-5) 0 var(--space-3);
  overflow: visible;
}
.bmi-marker {
  position: absolute; top: 50%; transform: translate(-50%,-50%);
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--paper);
  border: 3px solid var(--ink);
  box-shadow: var(--shadow-lg);
  transition: left 0.8s cubic-bezier(0.16,1,0.3,1);
}
.bmi-labels {
  display: flex; justify-content: space-between;
  font-size: var(--text-xs); color: var(--ink3); font-weight: 600;
  font-family: var(--font-display);
  text-transform: uppercase; letter-spacing: 0.06em;
}
.bmi-scale-items {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(min(100px, 100%), 1fr));
  gap: clamp(0.375rem, 1.5vw, 0.625rem);
  margin-top: var(--space-4);
}
.bmi-scale-item {
  padding: clamp(0.625rem, 2vw, 0.875rem);
  border-radius: var(--r);
  border: 1.5px solid var(--border);
  text-align: center;
  transition: var(--transition);
}
.bmi-scale-dot { width: 8px; height: 8px; border-radius: 50%; margin: 0 auto var(--space-2); }
.bmi-scale-label {
  font-size: var(--text-xs); font-weight: 700;
  color: var(--ink3); font-family: var(--font-display);
  text-transform: uppercase; letter-spacing: 0.06em;
}
.bmi-scale-range { font-size: var(--text-xs); color: var(--ink3); margin-top: var(--space-1); }

/* ══════════════════════════════════════
   ANALYTICS
══════════════════════════════════════ */
.analytics-switcher {
  display: flex;
  background: var(--mist2);
  border-radius: var(--r-lg);
  padding: 4px; gap: 4px;
  margin-bottom: var(--space-5);
}
.a-switch-btn {
  flex: 1; padding: clamp(0.5rem, 1.5vw, 0.75rem) clamp(0.375rem, 1vw, 0.625rem);
  border-radius: var(--r);
  font-size: var(--text-xs); font-weight: 700;
  font-family: var(--font-display);
  background: none; color: var(--ink3);
  transition: var(--transition); text-align: center;
  white-space: nowrap;
}
.a-switch-btn.active { background: var(--paper); color: var(--teal); box-shadow: var(--shadow-sm); }
.a-switch-btn:hover:not(.active) { color: var(--ink); }

/* Mini chart bars */
.chart-wrap {
  display: flex; align-items: flex-end;
  gap: clamp(0.25rem, 1vw, 0.375rem);
  height: clamp(70px, 15vw, 110px);
  padding-top: var(--space-4);
}
.chart-col {
  flex: 1;
  display: flex; flex-direction: column; align-items: center;
  height: 100%; justify-content: flex-end;
  gap: var(--space-2);
}
.chart-bar {
  width: 100%; border-radius: 5px 5px 0 0;
  min-height: 4px;
  transition: height 0.7s cubic-bezier(0.16,1,0.3,1);
  cursor: pointer; position: relative;
}
.chart-bar:hover::after {
  content: attr(data-val);
  position: absolute; top: -26px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: var(--paper);
  font-size: var(--text-xs); padding: 3px 7px; border-radius: 5px;
  white-space: nowrap; font-family: var(--font-mono);
  z-index: 10;
}
.chart-day-label {
  font-size: var(--text-xs); color: var(--ink3);
  font-weight: 600; text-align: center;
  font-family: var(--font-display);
}

/* Stat summary grid */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: clamp(0.5rem, 2vw, 0.75rem);
  margin-bottom: var(--space-4);
}
.summary-item {
  background: var(--mist);
  border: 1.5px solid var(--border-strong);
  border-radius: var(--r-lg);
  padding: clamp(0.875rem, 3vw, 1.125rem);
}
.summary-val {
  font-family: var(--font-display);
  font-size: clamp(1.375rem, 4vw, 2rem);
  font-weight: 700;
  letter-spacing: -0.5px; line-height: 1.1;
  overflow: hidden; text-overflow: ellipsis;
}
.summary-lbl { font-size: var(--text-xs); color: var(--ink3); margin-top: var(--space-1); }
.summary-sublbl { font-size: var(--text-xs); color: var(--ink3); margin-top: var(--space-1); font-family: var(--font-mono); }

/* Heatmap */
.heatmap { display: grid; grid-template-columns: repeat(7, 1fr); gap: clamp(3px, 1vw, 5px); }
.hm-cell { aspect-ratio: 1; border-radius: 5px; cursor: pointer; transition: var(--spring); }
.hm-cell:hover { transform: scale(1.3); }

/* Insight block */
.insight-block {
  display: flex; gap: clamp(0.75rem, 2.5vw, 1rem); align-items: flex-start;
  padding: clamp(0.875rem, 3vw, 1.25rem);
  border: 1.5px solid var(--border);
  border-radius: var(--r-lg);
  background: var(--mist);
  animation: slideIn 0.25s ease;
}
.insight-ico { font-size: clamp(18px, 3.5vw, 24px); flex-shrink: 0; }
.insight-title { font-size: var(--text-base); font-weight: 700; margin-bottom: var(--space-1); font-family: var(--font-display); }
.insight-body { font-size: var(--text-base); color: var(--ink2); line-height: 1.55; }
.insight-body strong { color: var(--ink); font-weight: 600; }

/* Achievement */
.achievement-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: clamp(0.5rem, 2vw, 0.75rem);
}
.achievement-card {
  background: var(--mist);
  border: 1.5px solid var(--border-strong);
  border-radius: var(--r-lg);
  padding: clamp(1rem, 3.5vw, 1.5rem) clamp(0.75rem, 2.5vw, 1.125rem);
  text-align: center; transition: var(--transition);
}
.achievement-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.achievement-ico { font-size: clamp(26px, 5vw, 34px); margin-bottom: var(--space-3); }
.achievement-val {
  font-family: var(--font-display);
  font-size: clamp(1.125rem, 3vw, 1.5rem);
  font-weight: 700; letter-spacing: -0.3px;
  overflow: hidden; text-overflow: ellipsis;
}
.achievement-lbl {
  font-size: var(--text-xs); color: var(--ink3);
  margin-top: var(--space-2); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
  font-family: var(--font-display);
}
.achievement-sub { font-size: var(--text-xs); color: var(--ink3); margin-top: var(--space-1); }

/* ══════════════════════════════════════
   EMPTY STATES
══════════════════════════════════════ */
.empty-state { text-align: center; padding: clamp(2rem, 8vw, 4rem) clamp(1rem, 4vw, 2rem); color: var(--ink3); }
.empty-ico { font-size: clamp(32px, 8vw, 48px); margin-bottom: var(--space-4); display: block; }
.empty-title {
  font-family: var(--font-display);
  font-size: var(--text-lg); font-weight: 700;
  color: var(--ink); margin-bottom: var(--space-2);
}
.empty-body { font-size: var(--text-base); line-height: 1.5; }

/* ══════════════════════════════════════
   SKELETON
══════════════════════════════════════ */
.skeleton {
  border-radius: var(--r);
  background: linear-gradient(90deg,var(--mist2) 25%,var(--mist3) 50%,var(--mist2) 75%);
  background-size: 400px 100%;
  animation: shimmer 1.5s infinite;
}

/* ══════════════════════════════════════
   DEV VIEW
══════════════════════════════════════ */
.dev-topbar {
  background: linear-gradient(135deg, #0f0a1a, #1a0f2e);
  border-bottom: 1px solid rgba(123,94,167,0.3);
}
.dev-topbar .topbar-inner { color: #e2d9f3; }
.dev-topbar .nav-tab { color: rgba(226,217,243,0.5); }
.dev-topbar .nav-tab.active { color: #c4b5fd; border-bottom-color: #c4b5fd; }
.dev-topbar .nav-bar { border-bottom: 1px solid rgba(123,94,167,0.2); }

.dev-stat-item {
  background: rgba(123,94,167,0.08);
  border: 1px solid rgba(123,94,167,0.2);
  border-radius: var(--r-lg);
  padding: clamp(0.875rem, 3vw, 1.125rem);
}
.dev-stat-val {
  font-family: var(--font-display);
  font-size: clamp(1.25rem, 3.5vw, 1.875rem);
  font-weight: 700;
  color: #c4b5fd; letter-spacing: -0.5px;
}
.dev-stat-lbl {
  font-size: var(--text-xs);
  color: rgba(226,217,243,0.5);
  text-transform: uppercase; letter-spacing: 0.1em;
  margin-top: var(--space-1); font-weight: 700;
}

.dev-user-card {
  background: rgba(123,94,167,0.05);
  border: 1px solid rgba(123,94,167,0.15);
  border-radius: var(--r-lg);
  padding: clamp(1rem, 3.5vw, 1.375rem);
  margin-bottom: clamp(0.625rem, 2vw, 0.875rem);
  transition: var(--transition);
}
.dev-user-card:hover { border-color: rgba(123,94,167,0.4); }

/* ══════════════════════════════════════
   LIVE INDICATOR
══════════════════════════════════════ */
.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--teal);
  animation: pulse 2s ease-in-out infinite;
  display: inline-block; flex-shrink: 0;
}
.live-dot.offline { background: var(--amber); animation: none; }

/* ══════════════════════════════════════
   RESPONSIVE BREAKPOINTS
══════════════════════════════════════ */

/* ── PHONE (< 480px) ── */
@media (max-width: 479px) {
  :root {
    --r-xl: 24px;
    --r-lg: 18px;
  }

  .hero-ring { display: none; }

  .stat-row { grid-template-columns: 1fr 1fr; }

  .bmi-scale-items { grid-template-columns: repeat(2, 1fr); }
  .achievement-grid { grid-template-columns: 1fr 1fr; }

  /* Stack meal cards better */
  .meal-card { flex-wrap: wrap; }
  .meal-cal { order: -1; }

  /* Dev user stats */
  .dev-user-stats { grid-template-columns: repeat(2, 1fr) !important; }

  /* Hide word "Aura" in topbar to save space */
  .topbar-brand-text { display: none; }

  .quick-actions { grid-template-columns: 1fr 1fr; }

  .summary-grid { grid-template-columns: 1fr 1fr; }
}

/* ── SMALL PHONE (< 360px) ── */
@media (max-width: 359px) {
  :root {
    --content-padding: 0.875rem;
  }
  .stat-row { grid-template-columns: 1fr 1fr; gap: 0.375rem; }
  .quick-actions { grid-template-columns: 1fr 1fr; gap: 0.375rem; }
  .streak-badge { display: none; }
  .ex-total-band { grid-template-columns: 1fr 1fr 1fr; }
}

/* ── TABLET (480px – 767px) ── */
@media (min-width: 480px) and (max-width: 767px) {
  .stat-row { grid-template-columns: repeat(2, 1fr); }
  .quick-actions { grid-template-columns: repeat(2, 1fr); }
  .g2 { grid-template-columns: repeat(2, 1fr); }
  .bmi-scale-items { grid-template-columns: repeat(4, 1fr); }
  .achievement-grid { grid-template-columns: repeat(2, 1fr); }
  .summary-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ── SMALL LAPTOP (768px – 1023px) ── */
@media (min-width: 768px) {
  .stat-row { grid-template-columns: repeat(4, 1fr); }
  .quick-actions { grid-template-columns: repeat(4, 1fr); }
  .achievement-grid { grid-template-columns: repeat(3, 1fr); }
  .summary-grid { grid-template-columns: repeat(4, 1fr); }
  .bmi-scale-items { grid-template-columns: repeat(4, 1fr); }
}

/* ── DESKTOP (1024px+) ── */
@media (min-width: 1024px) {
  .achievement-grid { grid-template-columns: repeat(3, 1fr); }
}

/* ── LARGE DESKTOP (1280px+) ── */
@media (min-width: 1280px) {
  :root { --content-padding: 1.5rem; }
}

/* gradient variables for analytics cards */
.gv1 { --gcolor: var(--teal); }
.gv2 { --gcolor: var(--violet); }
.gv3 { --gcolor: var(--amber); }
.gv4 { --gcolor: var(--sky); }

</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<div id="app"></div>

<script>
/* ══════════════════════════════════════
   CORE
══════════════════════════════════════ */
const API_BASE = window.WELLNESS_API || 'https://wellness-backend-59u8.onrender.com';
function getToday(){return new Date().toISOString().split('T')[0];}
const TODAY = getToday();
const WATER_GOAL = 8;

const Auth = (()=>{
  let _t=null,_u=null;
  return{
    set(t,u){_t=t;_u=u;},
    get(){return _t;},
    user(){return _u;},
    clear(){_t=null;_u=null;},
    ok(){return !!_t;},
    isDev(){return _u?.role==='dev';}
  };
})();

async function api(method,path,body){
  const headers={'Content-Type':'application/json'};
  if(Auth.get()) headers['Authorization']=`Bearer ${Auth.get()}`;
  const res=await fetch(API_BASE+'/api'+path,{method,headers,body:body?JSON.stringify(body):undefined});
  if(res.status===204) return null;
  const data=await res.json();
  if(res.status===401&&path.includes('/auth/')) throw new Error(data.message||'Invalid credentials');
  if(res.status===401){Auth.clear();renderApp();return null;}
  if(!res.ok) throw new Error(data.message||'Request failed');
  return data;
}
const GET=p=>api('GET',p);
const POST=(p,b)=>api('POST',p,b);
const PUT=(p,b)=>api('PUT',p,b);
const DEL=p=>api('DELETE',p);

let state={
  view:'auth',authMode:'login',authErr:'',authLoading:false,
  tab:0,devTab:0,analyticsTab:0,
  log:{water:0,meals:[],exercise:[]},
  bmi:null,streak:0,report:[],
  loading:true,sseConnected:false,lastSync:null,
  weeklyLogs:[],monthlyLogs:[],bests:null,analyticsLoading:false,
};

function setState(patch){
  Object.assign(state,patch);
  renderApp();
  setTimeout(()=>{
    const bar=document.querySelector('.nav-bar-inner');
    const act=document.querySelector('.nav-tab.active');
    if(bar&&act){
      const cl=bar.getBoundingClientRect().left;
      const tl=act.getBoundingClientRect().left;
      bar.scrollTo({left:bar.scrollLeft+tl-cl-(bar.offsetWidth/2)+(act.offsetWidth/2),behavior:'smooth'});
    }
  },30);
}

const app=document.getElementById('app');

function renderApp(){
  if(!Auth.ok()){app.innerHTML=authView();bindAuth();return;}
  if(Auth.isDev()){app.innerHTML=devView();bindDev();return;}
  app.innerHTML=userView();bindUser();
}

/* ── HELPERS ── */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function greet(){const h=new Date().getHours();return h<5?'Night owl,':h<12?'Good morning,':h<17?'Good afternoon,':'Good evening,';}
function fmtDate(){return new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});}
function shortDate(ds){return new Date(ds).toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function dayName(ds){return new Date(ds+'T00:00:00').toLocaleDateString('en-US',{weekday:'short'});}
function bmiColor(cat){return{Underweight:'#4facfe',Normal:'#00c9a7',Overweight:'#f0a500',Obese:'#ff6b6b'}[cat]||'#9e9892';}
function bmiPos(val){
  const min=13,max=35;
  return Math.min(100,Math.max(0,((val-min)/(max-min))*100));
}

/* ══════════════════════════════════════
   AUTH VIEW
══════════════════════════════════════ */
const AUTH_CFG={
  login:{title:'Welcome back',sub:'Pick up where you left off',action:'Sign in →',cls:'btn-primary'},
  register:{title:'Begin your journey',sub:'Track, improve, and thrive',action:'Create account →',cls:'btn-teal'},
  dev:{title:'Developer access',sub:'Restricted to admins only',action:'Access dashboard →',cls:'btn-violet'},
};

function authView(){
  const m=state.authMode,c=AUTH_CFG[m];
  return`
  <div class="auth-scene">
    <div class="auth-wrap fade">
      <div class="auth-brand">
        <div class="auth-brand-mark"></div>
        <div class="auth-brand-name">Aura</div>
        <div class="auth-brand-sub">Your personal wellness companion</div>
      </div>
      <div class="auth-card">
        <div class="auth-mode-title">${c.title}</div>
        <div class="auth-mode-sub">${c.sub}</div>
        ${state.authErr?`<div class="auth-alert">⚠️ ${esc(state.authErr)}</div>`:''}
        ${m!=='dev'?`<div class="field"><label class="label">Your name</label><input id="auth-name" placeholder="e.g. Alex" autocomplete="off"></div>`:''}
        <div class="field"><label class="label">${m==='dev'?'Developer password':'Password'}</label><input type="password" id="auth-pass" placeholder="••••••••"></div>
        <button id="auth-submit" class="btn ${c.cls} btn-full" style="margin-top:4px">
          ${state.authLoading?`<span class="spinner" style="border-top-color:#fff;border-color:rgba(255,255,255,0.3)"></span>`:`<span>${c.action}</span>`}
        </button>
        <div class="auth-footer">
          ${m!=='login'?`<button id="go-login" class="auth-link">← Sign in</button>`:''}
          ${m==='login'?`<button id="go-register" class="auth-link">New here? →</button>`:''}
          ${m!=='dev'?`<button id="go-dev" class="auth-link auth-link-violet">Developer →</button>`:''}
        </div>
      </div>
    </div>
  </div>`;
}

function bindAuth(){
  const q=id=>document.getElementById(id);
  q('go-login')?.addEventListener('click',()=>setState({authMode:'login',authErr:''}));
  q('go-register')?.addEventListener('click',()=>setState({authMode:'register',authErr:''}));
  q('go-dev')?.addEventListener('click',()=>setState({authMode:'dev',authErr:''}));
  q('auth-submit').addEventListener('click',doAuth);
  ['auth-name','auth-pass'].forEach(id=>q(id)?.addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();}));
}

async function doAuth(){
  const m=state.authMode;
  const name=(document.getElementById('auth-name')?.value||'').trim();
  const pass=(document.getElementById('auth-pass')?.value||'').trim();
  state.authLoading=true;state.authErr='';renderApp();
  try{
    let data;
    if(m==='dev') data=await POST('/auth/dev/login',{password:pass});
    else if(m==='register') data=await POST('/auth/register',{name,password:pass});
    else data=await POST('/auth/login',{name,password:pass});
    if(!data) throw new Error('Could not connect. Please try again.');
    Auth.set(data.token,data.user);
    state.authLoading=false;
    if(Auth.isDev()){state.devTab=0;await loadDevReport();startSSE();renderApp();}
    else{state.tab=0;await loadUserData();renderApp();}
  }catch(e){setState({authLoading:false,authErr:e.message});}
}

async function loadUserData(){
  state.loading=true;
  try{
    const[log,bmi,streak]=await Promise.all([
      GET(`/me/log/${getToday()}`),
      GET('/me/bmi'),
      GET('/me/streak'),
    ]);
    state.log=log||{water:0,meals:[],exercise:[]};
    state.bmi=bmi||null;
    state.streak=streak?.streak||0;
  }catch(e){console.error(e);}
  state.loading=false;
}

async function saveLog(newLog){
  state.log=newLog;renderApp();
  try{await PUT(`/me/log/${getToday()}`,newLog);}
  catch(e){alert('Save failed: '+e.message);loadUserData().then(renderApp);}
}

async function loadAnalytics(){
  if(state.analyticsLoading) return;
  state.analyticsLoading=true;renderApp();
  try{
    const[weekly,monthly,bests]=await Promise.all([
      GET('/me/logs/range?days=7'),
      GET('/me/logs/range?days=30'),
      GET('/me/bests'),
    ]);
    state.weeklyLogs=weekly||[];
    state.monthlyLogs=monthly||[];
    state.bests=bests||null;
  }catch(e){console.error(e);}
  state.analyticsLoading=false;renderApp();
}

/* ══════════════════════════════════════
   USER VIEW
══════════════════════════════════════ */
const USER_TABS=[
  {label:'Home',icon:'●'},
  {label:'Water',icon:'◌'},
  {label:'Meals',icon:'◈'},
  {label:'Move',icon:'◎'},
  {label:'Body',icon:'◇'},
  {label:'Insights',icon:'◆'},
];

function userView(){
  if(state.loading) return `<div style="display:flex;align-items:center;justify-content:center;height:100vh;height:100dvh;flex-direction:column;gap:16px">
    <div class="spinner"></div>
    <div style="font-size:var(--text-sm);color:var(--ink3);font-family:var(--font-display)">Loading your aura…</div>
  </div>`;

  const u=Auth.user();
  return`
  <div class="app-shell">
    <div class="topbar">
      <div class="topbar-inner">
        <div class="topbar-brand">
          <div class="topbar-icon">🌿</div>
          <span class="topbar-brand-text">Aura</span>
        </div>
        <div class="topbar-right">
          ${state.streak>0?`<div class="streak-badge">🔥 ${state.streak}</div>`:''}
          <div class="user-chip">${esc(u.name)}</div>
          <button class="sign-out-btn" id="logout-btn">Sign out</button>
        </div>
      </div>
      <div class="nav-bar">
        <div class="nav-bar-inner">
          ${USER_TABS.map((t,i)=>`
            <button class="nav-tab${state.tab===i?' active':''}" data-tab="${i}">
              <span class="nav-tab-dot"></span>${t.label}
            </button>`).join('')}
        </div>
      </div>
    </div>
    <div class="main-wrap fade">
      ${state.tab===0?dashView():
        state.tab===1?hydView():
        state.tab===2?mealsView():
        state.tab===3?exerciseView():
        state.tab===4?bmiView():
        analyticsView()}
    </div>
  </div>`;
}

function bindUser(){
  document.querySelectorAll('[data-tab]').forEach(el=>{
    el.addEventListener('click',()=>{
      const t=+el.dataset.tab;
      setState({tab:t});
      if(t===5&&!state.weeklyLogs.length) loadAnalytics();
    });
  });
  document.querySelectorAll('[data-go-tab]').forEach(el=>{
    el.addEventListener('click',()=>{
      const t=+el.dataset.goTab;
      setState({tab:t});
      if(t===5&&!state.weeklyLogs.length) loadAnalytics();
    });
  });
  document.getElementById('logout-btn')?.addEventListener('click',doLogout);

  // Water
  document.getElementById('water-inc')?.addEventListener('click',()=>{
    saveLog({...state.log,water:Math.min(20,(state.log.water||0)+1)});
  });
  document.getElementById('water-dec')?.addEventListener('click',()=>{
    saveLog({...state.log,water:Math.max(0,(state.log.water||0)-1)});
  });
  document.querySelectorAll('.glass-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const i=+el.dataset.i;
      const g=state.log.water||0;
      saveLog({...state.log,water:i<g?i:i+1});
    });
  });

  // Meals
  document.getElementById('meal-add')?.addEventListener('click',addMeal);
  document.getElementById('meal-name')?.addEventListener('keydown',e=>{if(e.key==='Enter')addMeal();});
  document.querySelectorAll('.meal-rm').forEach(el=>{
    el.addEventListener('click',()=>{
      const meals=[...(state.log.meals||[])];
      meals.splice(+el.dataset.i,1);
      saveLog({...state.log,meals});
    });
  });
  document.querySelectorAll('.meal-type-tab').forEach(el=>{
    el.addEventListener('click',()=>{
      document.querySelectorAll('.meal-type-tab').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
    });
  });

  // Exercise
  document.querySelectorAll('.ex-preset-chip').forEach(el=>{
    el.addEventListener('click',()=>{
      document.querySelectorAll('.ex-preset-chip').forEach(x=>x.classList.remove('selected'));
      el.classList.add('selected');
      document.getElementById('ex-type').value=el.dataset.t;
      document.getElementById('ex-dur').value=el.dataset.d;
      document.getElementById('ex-cal').value=el.dataset.k;
    });
  });
  document.getElementById('ex-add')?.addEventListener('click',addExercise);
  document.querySelectorAll('.ex-rm').forEach(el=>{
    el.addEventListener('click',()=>{
      const exercise=[...(state.log.exercise||[])];
      exercise.splice(+el.dataset.i,1);
      saveLog({...state.log,exercise});
    });
  });

  // BMI
  document.getElementById('bmi-calc')?.addEventListener('click',calcBmi);

  // Analytics
  document.querySelectorAll('[data-atab]').forEach(el=>{
    el.addEventListener('click',()=>setState({analyticsTab:+el.dataset.atab}));
  });
  document.getElementById('export-pdf')?.addEventListener('click',exportPDF);
  document.getElementById('load-analytics')?.addEventListener('click',loadAnalytics);
  document.getElementById('refresh-analytics')?.addEventListener('click',()=>{
    state.weeklyLogs=[];state.monthlyLogs=[];state.bests=null;
    loadAnalytics();
  });
}

/* ══════════════════════════════════════
   DASHBOARD
══════════════════════════════════════ */
function dashView(){
  const log=state.log,bmi=state.bmi;
  const g=log.water||0;

async function calcBmi(){
  const w=parseFloat(document.getElementById('bmi-w')?.value);
  const h=parseFloat(document.getElementById('bmi-h')?.value)/100;
  if(!w||!h||h<=0) return;
  const val=parseFloat((w/(h*h)).toFixed(1));
  const category=val<18.5?'Underweight':val<25?'Normal':val<30?'Overweight':'Obese';
  const bmiData={bmi:val,weight:w,height_cm:parseFloat(document.getElementById('bmi-h').value),category};
  state.bmi=bmiData;renderApp();
  try{await PUT('/me/bmi',bmiData);}
  catch(e){alert('Failed to save BMI: '+e.message);}
}

function weeklyView(){
  const logs=state.weeklyLogs;
  if(!logs.length) return`<div class="card"><div class="empty-state"><span class="empty-ico">📊</span><div class="empty-title">No weekly data</div><div class="empty-body">Start logging daily to see your weekly trends.</div></div></div>`;

  const avgWater=(logs.reduce((s,l)=>s+(l.water||0),0)/logs.length);
  const totalExMins=logs.reduce((s,l)=>s+(l.exercise||[]).reduce((a,e)=>a+(e.duration||0),0),0);
  const totalCalBurned=logs.reduce((s,l)=>s+(l.exercise||[]).reduce((a,e)=>a+(e.calories||0),0),0);
  const totalMeals=logs.reduce((s,l)=>s+(l.meals||[]).length,0);
  const activeDays=logs.filter(l=>l.water>0||(l.meals||[]).length>0||(l.exercise||[]).length>0).length;
  const workoutDays=logs.filter(l=>(l.exercise||[]).length>0).length;
  const consistency=Math.round((activeDays/7)*100);

  const maxWater=Math.max(...logs.map(l=>l.water||0),WATER_GOAL);

          return`<div class="chart-col">

function generateInsights(weekly,monthly,bests){
  const ins=[];
  if(weekly.length>0){
    const avgWater=weekly.reduce((s,l)=>s+(l.water||0),0)/weekly.length;
    const pct=Math.round((avgWater/WATER_GOAL)*100);
    if(avgWater>=WATER_GOAL) ins.push({icon:'💧',title:'Hydration on point',text:`You averaged <strong>${avgWater.toFixed(1)} glasses</strong> per day — consistently hitting your goal. Excellent!`});
    else ins.push({icon:'💧',title:'Hydration opportunity',text:`You averaged <strong>${avgWater.toFixed(1)} glasses</strong> per day — that's ${pct}% of your goal. Small sips add up!`});

    const wkDays=weekly.filter(l=>(l.exercise||[]).length>0).length;
    if(wkDays>=5) ins.push({icon:'🏃',title:'Elite consistency',text:`${wkDays} workout days out of 7 — that's elite-level consistency. Your body is thanking you.`});
    else if(wkDays>=3) ins.push({icon:'🏃',title:'Building momentum',text:`<strong>${wkDays} of 7 days</strong> active this week. Adding one more session could push you to that elite zone.`});
    else if(wkDays>0) ins.push({icon:'🏃',title:'Movement matters',text:`You moved <strong>${wkDays} day(s)</strong> this week. Even short 15-minute sessions have massive long-term benefits.`});
    else ins.push({icon:'🏃',title:'Time to move',text:'No exercise logged this week. A 20-minute walk is all it takes to start building momentum.'});

    const mDays=weekly.filter(l=>(l.meals||[]).length>0).length;
    const avgM=(weekly.reduce((s,l)=>s+(l.meals||[]).length,0)/weekly.length).toFixed(1);
    if(mDays<4) ins.push({icon:'🥗',title:'Track more meals',text:`Only <strong>${mDays} days</strong> with meals logged. Consistent tracking helps you understand and optimize your nutrition.`});
    else ins.push({icon:'🥗',title:'Nutrition awareness',text:`Averaging <strong>${avgM} meals per day</strong> tracked — great habit. Awareness is the first step to better choices.`});

    const wkndL=weekly.filter(l=>{const d=new Date(l.date+'T00:00:00').getDay();return d===0||d===6;});
    const wkdyL=weekly.filter(l=>{const d=new Date(l.date+'T00:00:00').getDay();return d>0&&d<6;});
    if(wkndL.length>0&&wkdyL.length>0){
      const wkndW=wkndL.reduce((s,l)=>s+(l.water||0),0)/wkndL.length;
      const wkdyW=wkdyL.reduce((s,l)=>s+(l.water||0),0)/wkdyL.length;
      if(wkndW<wkdyW-1) ins.push({icon:'📅',title:'Weekend hydration dips',text:`Your water intake drops by <strong>${(wkdyW-wkndW).toFixed(1)} glasses</strong> on weekends. Keep a visible bottle at home too!`});
      else if(wkdyW<wkndW-1) ins.push({icon:'📅',title:'Weekday hydration dips',text:`You drink <strong>${(wkndW-wkdyW).toFixed(1)} fewer glasses</strong> on weekdays. Try keeping water at your desk.`});
    }

    const totalMins=weekly.reduce((s,l)=>s+(l.exercise||[]).reduce((a,e)=>a+(e.duration||0),0),0);
    if(totalMins>=150) ins.push({icon:'⭐',title:'WHO goal achieved!',text:`<strong>${totalMins} minutes</strong> of weekly exercise — you exceeded the WHO recommendation of 150 minutes. Outstanding!`});
    else if(totalMins>0) ins.push({icon:'💪',title:'Building exercise volume',text:`<strong>${totalMins} minutes</strong> this week. You're ${Math.round((totalMins/150)*100)}% towards the 150-min WHO recommendation.`});
  }
  if(bests){
    if(bests.longestStreak>=7) ins.push({icon:'🔥',title:'Streak master',text:`Your all-time streak is <strong>${bests.longestStreak} days</strong>. Consistency is the superpower that compounds over time.`});
    if(bests.totalDaysLogged>=14) ins.push({icon:'📊',title:'Rich data foundation',text:`With <strong>${bests.totalDaysLogged} days</strong> of data, your insights are becoming increasingly accurate. Keep logging!`});
  }
  if(!ins.length) ins.push({icon:'💡',title:'Keep logging!',text:'Track meals, water, and exercise daily for your personalized insights to appear here.'});
  return ins;
}

      section('Monthly Summary (Last 30 Days)');
      const avgW=(m.reduce((s,l)=>s+(l.water||0),0)/m.length).toFixed(1);
      const exMins=m.reduce((s,l)=>s+(l.exercise||[]).reduce((a,e)=>a+(e.duration||0),0),0);
      const eCal=m.reduce((s,l)=>s+(l.exercise||[]).reduce((a,e)=>a+(e.calories||0),0),0);
      const wkDays=m.filter(l=>(l.exercise||[]).length>0).length;
      const active=m.filter(l=>l.water>0||(l.meals||[]).length>0||(l.exercise||[]).length>0).length;
      line(`• Avg daily water: ${avgW} glasses`);
      line(`• Workout days: ${wkDays} · Exercise time: ${exMins} min`);
      line(`• Calories burned: ${eCal} kcal · Consistency: ${Math.round((active/30)*100)}%`);
      y+=4;
    }
    if(b){
      doc.setTextColor(12,13,17);
      section('Personal Bests');
      line(`• Longest streak: ${b.longestStreak} days`);
      line(`• Best hydration: ${b.bestWater?.value||0} glasses`);
      line(`• Most exercise: ${b.bestExerciseMins?.value||0} min · Most cals burned: ${b.bestCaloriesBurned?.value||0}`);
      line(`• Total days logged: ${b.totalDaysLogged}`);
    }

    doc.setTextColor(148,163,184);doc.setFontSize(9);
    doc.text('Generated by Aura Wellness · Keep tracking, keep growing 🌿',15,285);
    doc.save(`aura-report-${TODAY}.pdf`);

  if(btn){btn.textContent='⬇ Export';btn.disabled=false;}

    doc.text(`• Water: ${water}/${WATER_GOAL} glasses · Streak: ${streak} days`,15,y);y+=7;
    doc.text(`• Meals: ${meals.length} (${mCal} kcal) · Exercise: ${eMin} min (${eCal} kcal burned)`,15,y);y+=10;
    if(bmi){doc.setTextColor(12,13,17);doc.setFontSize(13);doc.setFont('helvetica','bold');doc.text('BMI',15,y);y+=8;doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(71,85,105);doc.text(`BMI: ${bmi.bmi.toFixed(1)} (${bmi.category}) · ${bmi.weight}kg / ${bmi.height_cm}cm`,15,y);y+=10;}
    if(meals.length){doc.setTextColor(12,13,17);doc.setFontSize(13);doc.setFont('helvetica','bold');doc.text('Meals',15,y);y+=8;doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(71,85,105);meals.forEach(m=>{doc.text(`• ${m.name} (${m.type}) — ${m.calories} kcal`,15,y);y+=7;});y+=3;}
    if(ex.length){doc.setTextColor(12,13,17);doc.setFontSize(13);doc.setFont('helvetica','bold');doc.text('Exercise',15,y);y+=8;doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(71,85,105);ex.forEach(e=>{doc.text(`• ${e.type} — ${e.duration} min, ${e.calories} kcal`,15,y);y+=7;});}
    doc.setTextColor(148,163,184);doc.setFontSize(9);doc.text('Aura Wellness · Developer Dashboard · Confidential',15,285);
    doc.save(`aura-${uname.toLowerCase().replace(/\s+/g,'-')}-${TODAY}.pdf`);
  }catch(e){alert('PDF export failed: '+e.message);}
}

/* ══════════════════════════════════════
   DEV VIEW
══════════════════════════════════════ */
function devView(){
  return`
  <div class="app-shell">
    <div class="topbar dev-topbar">
      <div class="topbar-inner">
        <div class="topbar-brand" style="color:#e2d9f3">
          <div class="topbar-icon" style="background:#7c3aed">🛡️</div>
          <span class="topbar-brand-text">Aura Admin</span>
        </div>
        <div class="topbar-right" style="gap:var(--space-3)">
          <div style="display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);color:${state.sseConnected?'#34d399':'#fbbf24'}">
            <div class="${state.sseConnected?'live-dot':'live-dot offline'}"></div>
            <span>${state.sseConnected?'Live':'Polling'}</span>
          </div>
          ${state.lastSync?`<span style="font-size:var(--text-xs);color:rgba(226,217,243,0.4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px">synced ${state.lastSync}</span>`:''}
          <button id="dev-refresh" style="font-size:var(--text-xs);color:#c4b5fd;background:rgba(123,94,167,0.15);border:1px solid rgba(123,94,167,0.3);border-radius:var(--r-sm);padding:var(--space-1) var(--space-3);font-weight:600;white-space:nowrap">Refresh</button>
          <button id="logout-btn" class="sign-out-btn" style="color:rgba(226,217,243,0.5)">Sign out</button>
        </div>
      </div>
      <div class="nav-bar" style="background:transparent;border-bottom:1px solid rgba(123,94,167,0.2)">
        <div class="nav-bar-inner">
          ${['Overview','All users'].map((t,i)=>`<button class="nav-tab${state.devTab===i?' active':''}" data-devtab="${i}" style="${state.devTab===i?'color:#c4b5fd;border-bottom-color:#c4b5fd;':'color:rgba(226,217,243,0.4);'}">${t}</button>`).join('')}
        </div>
      </div>
    </div>
    <div class="main-wrap fade">
      ${state.loading?`<div style="display:flex;justify-content:center;padding:clamp(2rem,8vw,4rem)"><div class="spinner"></div></div>`:state.devTab===0?devOverview():devUsers()}
    </div>
  </div>`;
}

function devOverview(){
  const r=state.report;
  const active=r.filter(x=>x.log.water>0||(x.log.meals?.length)||(x.log.exercise?.length)).length;
  const totalW=r.reduce((s,x)=>s+(x.log.water||0),0);
  const totalM=r.reduce((s,x)=>s+(x.log.meals?.length||0),0);
  const totalE=r.reduce((s,x)=>s+(x.log.exercise||[]).reduce((a,e)=>a+(e.duration||0),0),0);
  const devStats=[
    {l:'Total users',v:r.length},{l:'Active today',v:`${active}/${r.length}`},
    {l:'Water glasses',v:totalW},{l:'Meals logged',v:totalM},{l:'Exercise min',v:totalE},
  ];
  return`<div class="col">
    <div class="g-auto">
      ${devStats.map(s=>`<div class="dev-stat-item"><div class="dev-stat-val">${s.v}</div><div class="dev-stat-lbl">${s.l}</div></div>`).join('')}
    </div>
    <div style="background:rgba(123,94,167,0.06);border:1px solid rgba(123,94,167,0.15);border-radius:var(--r-lg);padding:clamp(1rem,3.5vw,1.375rem)">
      <div style="font-weight:600;margin-bottom:var(--space-2);color:#c4b5fd;font-family:var(--font-display);font-size:var(--text-base)">Real-time sync active</div>
      <div style="font-size:var(--text-sm);color:rgba(226,217,243,0.5);line-height:1.6">All user writes are broadcast instantly via SSE. Data is server-authoritative. All /dev/* endpoints enforce role=dev JWT.</div>
    </div>
  </div>`;
}

function devUsers(){
  const r=state.report;
  if(!r.length) return`<div class="card"><div class="empty-state"><span class="empty-ico">👥</span><div class="empty-title">No users yet</div></div></div>`;
  return`<div class="col">
    ${r.map(x=>{
      const{user:u,log,bmi,streak}=x;
      const hasData=log.water>0||(log.meals?.length)||(log.exercise?.length);
      const mCal=(log.meals||[]).reduce((s,m)=>s+(m.calories||0),0);
      const eMin=(log.exercise||[]).reduce((s,e)=>s+(e.duration||0),0);
      const wPct=Math.min(100,Math.round(((log.water||0)/WATER_GOAL)*100));
      return`<div class="dev-user-card">
        <div class="row" style="margin-bottom:var(--space-4);padding-bottom:var(--space-3);border-bottom:1px solid rgba(123,94,167,0.15);flex-wrap:wrap;gap:var(--space-3)">
          <div style="width:clamp(32px,5vw,40px);height:clamp(32px,5vw,40px);border-radius:50%;background:rgba(123,94,167,0.2);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:var(--text-base);color:#c4b5fd;flex-shrink:0">${esc(u.name[0].toUpperCase())}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:var(--text-md);font-family:var(--font-display);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(u.name)}</div>
            <div style="font-size:var(--text-xs);color:var(--ink3)">Joined ${u.joined}${streak>0?` · 🔥 ${streak}-day streak`:''}</div>
          </div>
          <span class="pill ${hasData?'pill-teal':'pill-neutral'}">${hasData?'Active':'No data'}</span>
          <button class="dev-pdf-btn" data-uid="${u.id}" data-uname="${esc(u.name)}" data-log='${esc(JSON.stringify(log))}' data-streak='${streak}' data-bmi='${esc(JSON.stringify(bmi))}' style="font-size:var(--text-xs);color:#7c3aed;background:rgba(123,94,167,0.1);border:1px solid rgba(123,94,167,0.25);border-radius:6px;padding:var(--space-1) var(--space-3);font-weight:600;white-space:nowrap">⬇ PDF</button>
          <button class="dev-delete-btn" data-uid="${u.id}" data-uname="${esc(u.name)}" style="font-size:var(--text-xs);color:var(--coral);background:var(--coral-dim);border:1px solid rgba(255,107,107,0.25);border-radius:6px;padding:var(--space-1) var(--space-3);font-weight:600;white-space:nowrap">Delete</button>
        </div>
        <div class="dev-user-stats" style="display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(0.375rem,1.5vw,0.625rem);margin-bottom:var(--space-3)">
          ${[{l:'Water',v:`${log.water||0}/${WATER_GOAL}`,c:'var(--sky)'},{l:'Meals',v:(log.meals||[]).length,s:mCal+'kcal',c:'var(--teal)'},{l:'Exercise',v:eMin+'m',c:'var(--amber)'},{l:'BMI',v:bmi?bmi.bmi.toFixed(1):'—',s:bmi?.category,c:bmiColor(bmi?.category)}].map(s=>`
            <div style="background:rgba(123,94,167,0.06);border-radius:var(--r-sm);padding:clamp(0.5rem,1.5vw,0.75rem);text-align:center">
              <div style="font-family:var(--font-display);font-size:clamp(0.875rem,2.5vw,1.125rem);font-weight:700;color:${s.c};overflow:hidden;text-overflow:ellipsis">${s.v}</div>
              ${s.s?`<div style="font-size:var(--text-xs);color:var(--ink3);overflow:hidden;text-overflow:ellipsis">${s.s}</div>`:''}
              <div style="font-size:var(--text-xs);color:var(--ink3);text-transform:uppercase;letter-spacing:0.08em;margin-top:var(--space-1);font-weight:700">${s.l}</div>
            </div>`).join('')}
        </div>
        <div class="progress-track" style="height:4px;margin-bottom:var(--space-3)"><div class="progress-fill" style="width:${wPct}%;background:linear-gradient(90deg,var(--sky),var(--teal))"></div></div>
        ${(log.meals||[]).length?`<div style="display:flex;flex-wrap:wrap;gap:var(--space-2);margin-bottom:var(--space-2)">${log.meals.map(m=>`<span style="padding:2px 8px;border-radius:5px;background:var(--teal-dim);border:1px solid rgba(0,201,167,0.2);font-size:var(--text-xs);color:var(--teal);white-space:nowrap">${esc(m.name)} · ${m.calories}kcal</span>`).join('')}</div>`:''}
        ${(log.exercise||[]).length?`<div style="display:flex;flex-wrap:wrap;gap:var(--space-2)">${log.exercise.map(e=>`<span style="padding:2px 8px;border-radius:5px;background:var(--amber-dim);border:1px solid rgba(240,165,0,0.2);font-size:var(--text-xs);color:var(--amber);white-space:nowrap">${esc(e.type)} · ${e.duration}min</span>`).join('')}</div>`:''}
        ${!hasData?`<div style="font-size:var(--text-sm);color:var(--ink3);padding:var(--space-1) 0">No activity logged today</div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

function bindDev(){
  document.querySelectorAll('[data-devtab]').forEach(el=>el.addEventListener('click',()=>setState({devTab:+el.dataset.devtab})));
  document.getElementById('logout-btn')?.addEventListener('click',doLogout);
  document.getElementById('dev-refresh')?.addEventListener('click',()=>loadDevReport().then(renderApp));
  document.querySelectorAll('.dev-pdf-btn').forEach(el=>{
    el.addEventListener('click',async()=>{
      const log=JSON.parse(el.dataset.log||'{}');
      const bmi=JSON.parse(el.dataset.bmi||'null');
      await exportUserPDF(el.dataset.uname,log,parseInt(el.dataset.streak)||0,bmi);
    });
  });
  document.querySelectorAll('.dev-delete-btn').forEach(el=>{
    el.addEventListener('click',async()=>{
      if(!confirm(`Delete user "${el.dataset.uname}"? This cannot be undone.`)) return;
      try{await DEL('/dev/users/'+el.dataset.uid);await loadDevReport();renderApp();}
      catch(e){alert('Delete failed: '+e.message);}
    });
  });
}

async function loadDevReport(){
  state.loading=true;
  try{const data=await GET('/dev/report');state.report=data||[];state.lastSync=new Date().toLocaleTimeString();}
  catch(e){console.error(e);}
  state.loading=false;
}

let sseInstance=null;
function startSSE(){
  if(sseInstance) sseInstance.close();
  try{
    const es=new EventSource(`${API_BASE}/api/dev/events?token=${encodeURIComponent(Auth.get())}`);
    es.onopen=()=>{state.sseConnected=true;renderApp();};
    es.onmessage=()=>{loadDevReport().then(renderApp);};
    es.onerror=()=>{state.sseConnected=false;sseInstance=null;startSSEPoll();};
    sseInstance=es;
  }catch{startSSEPoll();}
}
let pollTimer=null;
function startSSEPoll(){
  clearInterval(pollTimer);
  pollTimer=setInterval(()=>{if(Auth.ok()&&Auth.isDev()) loadDevReport().then(renderApp);},8000);
}

async function doLogout(){
  try{await DEL('/auth/logout');}catch{}
  Auth.clear();
  if(sseInstance){sseInstance.close();sseInstance=null;}
  clearInterval(pollTimer);
  setState({view:'auth',authMode:'login',authErr:'',tab:0,devTab:0,analyticsTab:0,log:{water:0,meals:[],exercise:[]},bmi:null,streak:0,report:[],weeklyLogs:[],monthlyLogs:[],bests:null,loading:true,sseConnected:false,lastSync:null});
}

function scheduleMidnightRefresh(){
  const now=new Date(),midnight=new Date(now);
  midnight.setHours(24,0,1,0);
  setTimeout(async()=>{
    if(Auth.ok()&&!Auth.isDev()){await loadUserData();renderApp();}
    scheduleMidnightRefresh();
  },midnight-now);
}

scheduleMidnightRefresh();
renderApp();
</script>
