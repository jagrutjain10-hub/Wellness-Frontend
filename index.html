<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wellness Tracker</title>
<style>
  :root {
    --primary: #2563eb;
    --dev: #7c3aed;
    --success: #16a34a;
    --warning: #d97706;
    --danger: #dc2626;
    --teal: #0d9488;
    --sky: #0284c7;
    --bg: #f8fafc;
    --surface: #ffffff;
    --surface2: #f1f5f9;
    --border: #e2e8f0;
    --text: #0f172a;
    --text2: #475569;
    --text3: #94a3b8;
    --radius: 10px;
    --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a; --surface: #1e293b; --surface2: #0f172a;
      --border: #334155; --text: #f1f5f9; --text2: #94a3b8; --text3: #475569;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }
  input, select, textarea { font-family: inherit; font-size: 13px; padding: 9px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); outline: none; width: 100%; transition: border-color .15s; }
  input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px #2563eb18; }
  button { font-family: inherit; cursor: pointer; border: none; transition: opacity .15s, transform .1s; }
  button:hover { opacity: .88; }
  button:active { transform: scale(.97); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fade { animation: fadeUp .25s ease; }
  .spinner { width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; }

  /* Layout */
  .page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 20px 22px; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 860px; margin: 0 auto; padding: 0 16px; }
  .header-top { display: flex; align-items: center; justify-content: space-between; height: 52px; }
  .tabs { display: flex; overflow-x: auto; gap: 0; }
  .tab { padding: 10px 16px; font-size: 13px; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; color: var(--text2); transition: color .15s; }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 500; }
  .tab.dev-active { color: var(--dev); border-bottom-color: var(--dev); font-weight: 500; }
  .main { max-width: 860px; margin: 0 auto; padding: 22px 16px 64px; }
  .grid { display: grid; gap: 12px; }
  .grid-2 { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
  .grid-4 { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); }
  .row { display: flex; align-items: center; gap: 10px; }
  .col { display: flex; flex-direction: column; gap: 12px; }

  /* Pill/badge */
  .pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }

  /* Buttons */
  .btn { padding: 10px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 500; color: #fff; }
  .btn-primary { background: var(--primary); }
  .btn-dev { background: var(--dev); }
  .btn-success { background: var(--success); }
  .btn-teal { background: var(--teal); }
  .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-danger { background: var(--danger); }
  .btn-full { width: 100%; }

  /* Form field */
  .field { display: flex; flex-direction: column; gap: 5px; }
  .label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; font-weight: 500; }

  /* Stats card */
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px; cursor: pointer; transition: border-color .2s; }
  .stat:hover { border-color: var(--primary); }
  .stat-val { font-size: 22px; font-weight: 600; }
  .stat-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .stat-label { font-size: 10px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: .05em; }
  .bar-wrap { height: 3px; background: var(--surface2); border-radius: 2px; margin-top: 8px; }
  .bar { height: 100%; border-radius: 2px; transition: width .5s; }

  /* Alert */
  .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 12px; }
  .alert-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
  .alert-success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }

  /* Row item */
  .item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .item:last-child { border-bottom: none; }
  .item-name { font-weight: 500; font-size: 13px; }
  .item-sub { font-size: 11px; color: var(--text2); }
  .remove-btn { font-size: 11px; color: var(--danger); background: #fef2f2; border: none; border-radius: 6px; padding: 3px 8px; flex-shrink: 0; }

  /* Water glasses */
  .glasses { display: flex; flex-wrap: wrap; gap: 6px; }
  .glass-btn { width: 40px; height: 48px; border-radius: 3px 3px 10px 10px; border: 1px solid #0284c744; font-size: 14px; cursor: pointer; transition: all .2s; }

  /* Dev card user avatar */
  .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 15px; flex-shrink: 0; }

  /* Empty state */
  .empty { text-align: center; padding: 30px 20px; color: var(--text2); font-size: 13px; }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }

  /* Preset chips */
  .chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: opacity .15s; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────
const API_BASE = window.WELLNESS_API || 'https://wellness-backend-59u8.onrender.com';
function getToday() { return new Date().toISOString().split('T')[0]; }
const TODAY = getToday();
const WATER_GOAL = 8;

// ── In-memory token store (never touches localStorage) ────────────────────
const Auth = (() => {
  let _token = null, _user = null;
  return {
    set(t, u) { _token = t; _user = u; },
    get() { return _token; },
    user() { return _user; },
    clear() { _token = null; _user = null; },
    ok() { return !!_token; },
    isDev() { return _user?.role === 'dev'; }
  };
})();

// ── API client ────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (Auth.get()) headers['Authorization'] = `Bearer ${Auth.get()}`;
  const res = await fetch(API_BASE + '/api' + path, {
    method, headers, body: body ? JSON.stringify(body) : undefined
  });
  if (res.status === 401) { Auth.clear(); renderApp(); return null; }
  if (res.status === 204) return null;
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || 'Request failed');
  return data;
}
const GET  = p      => api('GET', p);
const POST = (p, b) => api('POST', p, b);
const PUT  = (p, b) => api('PUT', p, b);
const DEL  = p      => api('DELETE', p);

// ── State ─────────────────────────────────────────────────────────────────
let state = {
  view: 'auth',         // auth | user | dev
  authMode: 'login',    // login | register | dev
  authErr: '',
  authLoading: false,
  tab: 0,
  devTab: 0,
  log: { water: 0, meals: [], exercise: [] },
  bmi: null,
  streak: 0,
  report: [],
  loading: true,
  syncing: false,
  lastSync: null,
  sseConnected: false,
};

function setState(patch) { Object.assign(state, patch); renderApp(); }

// ── Render engine ─────────────────────────────────────────────────────────
const app = document.getElementById('app');
function renderApp() {
  if (!Auth.ok()) { app.innerHTML = authView(); bindAuth(); return; }
  if (Auth.isDev()) { app.innerHTML = devView(); bindDev(); return; }
  app.innerHTML = userView(); bindUser();
}

// ── Helpers ───────────────────────────────────────────────────────────────
function pill(txt, color) {
  return `<span class="pill" style="background:${color}18;color:${color};border:1px solid ${color}30">${txt}</span>`;
}
function bmiColor(cat) {
  return { Underweight: '#0284c7', Normal: '#16a34a', Overweight: '#d97706', Obese: '#dc2626' }[cat] || '#64748b';
}
function greet() {
  const h = new Date().getHours();
  return h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
}
function fmtDate() {
  return new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Auth view ─────────────────────────────────────────────────────────────
function authView() {
  const m = state.authMode;
  const titles = { login: 'Sign in', register: 'Create account', dev: 'Developer access' };
  const btnColor = m === 'dev' ? 'var(--dev)' : 'var(--primary)';
  return `
  <div class="page">
    <div style="width:100%;max-width:380px">
      <div style="text-align:center;margin-bottom:24px">
        <div style="display:inline-flex;width:46px;height:46px;border-radius:13px;background:${m==='dev'?'var(--dev)':'var(--primary)'};align-items:center;justify-content:center;margin-bottom:10px">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
            ${m==='dev'?'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>':`<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>`}
          </svg>
        </div>
        <div style="font-size:20px;font-weight:600;color:var(--text)">Wellness Tracker</div>
        <div style="font-size:13px;color:var(--text2);margin-top:3px">${titles[m]}</div>
      </div>

      <div class="card">
        ${state.authErr ? `<div class="alert alert-error">${escHtml(state.authErr)}</div>` : ''}
        ${m !== 'dev' ? `<div class="field" style="margin-bottom:12px"><label class="label">Your name</label><input id="auth-name" placeholder="e.g. Alex" autocomplete="off"></div>` : ''}
        <div class="field" style="margin-bottom:12px"><label class="label">${m==='dev'?'Dev password':'Password'}</label><input type="password" id="auth-pass" placeholder="••••••••"></div>
        <button id="auth-submit" class="btn ${m==='dev'?'btn-dev':'btn-primary'} btn-full" style="margin-top:4px">
          ${state.authLoading ? '<span style="display:inline-flex;gap:8px;align-items:center"><span class="spinner" style="width:14px;height:14px;border-width:1.5px"></span>Loading…</span>' : (m==='register'?'Create account':m==='dev'?'Sign in as developer':'Sign in')}
        </button>
        <div style="margin-top:14px;display:flex;gap:6px;flex-wrap:wrap;justify-content:center">
          ${m!=='login'    ? `<button id="go-login"    style="font-size:12px;color:var(--text2);background:none;padding:4px 8px">Sign in instead</button>` : ''}
          ${m==='login'    ? `<button id="go-register" style="font-size:12px;color:var(--text2);background:none;padding:4px 8px">Create account</button>` : ''}
          ${m!=='dev'      ? `<button id="go-dev"      style="font-size:12px;color:var(--dev);background:none;padding:4px 8px">Developer access →</button>` : ''}
        </div>
      </div>
      ${m==='dev'?`<div style="margin-top:10px;padding:10px 13px;border-radius:var(--radius);background:#7c3aed10;border:1px solid #7c3aed30;font-size:11px;color:var(--dev)">No passwords or secrets are stored in the browser. All auth is validated server-side via JWT.</div>`:''}
    </div>
  </div>`;
}

function bindAuth() {
  const q = id => document.getElementById(id);
  const setMode = m => { setState({ authMode: m, authErr: '' }); };
  q('go-login')    && q('go-login').addEventListener('click',    () => setMode('login'));
  q('go-register') && q('go-register').addEventListener('click', () => setMode('register'));
  q('go-dev')      && q('go-dev').addEventListener('click',      () => setMode('dev'));

  q('auth-submit').addEventListener('click', doAuth);
  ['auth-name','auth-pass'].forEach(id => {
    q(id) && q(id).addEventListener('keydown', e => { if (e.key === 'Enter') doAuth(); });
  });
}

async function doAuth() {
  const m = state.authMode;
  const name = (document.getElementById('auth-name')?.value || '').trim();
  const pass = (document.getElementById('auth-pass')?.value || '').trim();
  state.authLoading = true; state.authErr = ''; renderApp();
  try {
    let data;
    if (m === 'dev')      data = await POST('/auth/dev/login', { password: pass });
    else if (m === 'register') data = await POST('/auth/register', { name, password: pass });
    else                  data = await POST('/auth/login', { name, password: pass });
    if (!data) throw new Error('No response from server. Check your internet connection.');
    Auth.set(data.token, data.user);
    state.authLoading = false;
    if (Auth.isDev()) { state.devTab = 0; await loadDevReport(); startSSE(); renderApp(); }
    else { state.tab = 0; await loadUserData(); renderApp(); }
  } catch(e) {
    setState({ authLoading: false, authErr: e.message });
  }
}

// ── Load user data ────────────────────────────────────────────────────────
async function loadUserData() {
  state.loading = true;
  try {
    const [log, bmi, streak] = await Promise.all([GET(`/me/log/${getToday()}`), GET('/me/bmi'), GET('/me/streak')]);
    state.log    = log    || { water: 0, meals: [], exercise: [] };
    state.bmi    = bmi   || null;
    state.streak = streak?.streak || 0;
  } catch(e) { console.error(e); }
  state.loading = false;
}

async function saveLog(newLog) {
  state.log = newLog;
  renderApp();
  try { await PUT(`/me/log/${getToday()}`, newLog); }
  catch(e) { alert('Save failed: ' + e.message); loadUserData().then(renderApp); }
}

// ── User view ─────────────────────────────────────────────────────────────
const USER_TABS = [
  { label: 'Dashboard', icon: '◈' },
  { label: 'Hydration', icon: '◉' },
  { label: 'Meals',     icon: '◎' },
  { label: 'Exercise',  icon: '◌' },
  { label: 'BMI',       icon: '⊞' },
];

function userView() {
  if (state.loading) return `<div style="display:flex;align-items:center;justify-content:center;height:100vh"><div class="spinner"></div></div>`;
  const u = Auth.user();
  return `
  <div class="header">
    <div class="header-inner">
      <div class="header-top">
        <div style="font-weight:600;font-size:15px;color:var(--text)">🌿 Wellness</div>
        <div class="row">
          ${state.streak > 0 ? pill('🔥 ' + state.streak + 'd', '#d97706') : ''}
          ${pill(escHtml(u.name), '#2563eb')}
          <button id="logout-btn" style="font-size:12px;color:var(--text2);background:none;padding:4px 8px">Sign out</button>
        </div>
      </div>
      <div class="tabs">
        ${USER_TABS.map((t, i) => `<button class="tab${state.tab===i?' active':''}" data-tab="${i}">${t.icon} ${t.label}</button>`).join('')}
      </div>
    </div>
  </div>
  <div class="main fade">
    ${state.tab===0 ? dashView() : state.tab===1 ? hydView() : state.tab===2 ? mealsView() : state.tab===3 ? exerciseView() : bmiView()}
  </div>`;
}

function bindUser() {
  document.querySelectorAll('[data-tab]').forEach(el => {
    el.addEventListener('click', () => setState({ tab: +el.dataset.tab }));
  });
  document.querySelectorAll('[data-stat-tab]').forEach(el => {
    el.addEventListener('click', () => setState({ tab: +el.dataset.statTab }));
  });
  document.getElementById('logout-btn')?.addEventListener('click', doLogout);

  // Hydration
  document.getElementById('water-inc')?.addEventListener('click', () => {
    const l = {...state.log, water: Math.min(20, (state.log.water||0)+1)};
    saveLog(l);
  });
  document.getElementById('water-dec')?.addEventListener('click', () => {
    const l = {...state.log, water: Math.max(0, (state.log.water||0)-1)};
    saveLog(l);
  });
  document.querySelectorAll('.glass-btn').forEach(el => {
    el.addEventListener('click', () => {
      const i = +el.dataset.i, g = state.log.water||0;
      saveLog({...state.log, water: i < g ? i : i+1});
    });
  });

  // Meals
  document.getElementById('meal-add')?.addEventListener('click', addMeal);
  document.getElementById('meal-name')?.addEventListener('keydown', e => { if (e.key==='Enter') addMeal(); });
  document.querySelectorAll('.meal-rm').forEach(el => {
    el.addEventListener('click', () => {
      const meals = [...(state.log.meals||[])]; meals.splice(+el.dataset.i,1);
      saveLog({...state.log, meals});
    });
  });

  // Exercise presets
  document.querySelectorAll('.ex-preset').forEach(el => {
    el.addEventListener('click', () => {
      document.getElementById('ex-type').value = el.dataset.t;
      document.getElementById('ex-dur').value  = el.dataset.d;
      document.getElementById('ex-cal').value  = el.dataset.k;
    });
  });
  document.getElementById('ex-add')?.addEventListener('click', addExercise);
  document.querySelectorAll('.ex-rm').forEach(el => {
    el.addEventListener('click', () => {
      const exercise = [...(state.log.exercise||[])]; exercise.splice(+el.dataset.i,1);
      saveLog({...state.log, exercise});
    });
  });

  // BMI
  document.getElementById('bmi-calc')?.addEventListener('click', calcBmi);
}

function dashView() {
  const log = state.log, bmi = state.bmi;
  const wPct = Math.min(100, Math.round(((log.water||0)/WATER_GOAL)*100));
  const mCal = (log.meals||[]).reduce((s,m)=>s+(m.calories||0),0);
  const eMin = (log.exercise||[]).reduce((s,e)=>s+(e.duration||0),0);
  const eCal = (log.exercise||[]).reduce((s,e)=>s+(e.calories||0),0);
  const stats = [
    { label:'Water',    val:`${log.water||0}/${WATER_GOAL}`, sub:'glasses',       color:'#0284c7', pct:wPct,  t:1 },
    { label:'Meals',    val:(log.meals||[]).length,           sub:mCal+' kcal',   color:'#16a34a', t:2 },
    { label:'Exercise', val:eMin+'m',                         sub:eCal+' kcal',   color:'#0d9488', t:3 },
    { label:'BMI',      val:bmi?bmi.bmi.toFixed(1):'—',      sub:bmi?.category||'Not set', color:bmiColor(bmi?.category), t:4 },
  ];
  return `
  <div class="col">
    <div class="card" style="border-left:3px solid var(--primary);border-radius:0 var(--radius-lg) var(--radius-lg) 0">
      <div style="font-size:11px;color:var(--text2);margin-bottom:3px">${fmtDate()}</div>
      <div style="font-size:19px;font-weight:600">${greet()}, ${escHtml(Auth.user().name)}</div>
      ${state.streak>=3?`<div style="font-size:12px;color:#d97706;margin-top:5px">🔥 ${state.streak}-day streak — keep it going!</div>`:''}
    </div>
    <div class="grid grid-2">
      ${stats.map(s=>`<div class="stat" data-stat-tab="${s.t}">
        <div class="stat-val" style="color:${s.color}">${s.val}</div>
        <div class="stat-sub">${s.sub}</div>
        <div class="stat-label">${s.label}</div>
        ${s.pct!==undefined?`<div class="bar-wrap"><div class="bar" style="width:${s.pct}%;background:${s.color}"></div></div>`:''}
      </div>`).join('')}
    </div>
    <div class="card" style="background:var(--surface2);border:none;font-size:12px;color:var(--text2)">
      🔒 Your data is stored securely on the server. Only you can access your health records.
    </div>
  </div>`;
}

function hydView() {
  const g = state.log.water||0, pct = Math.min(100,(g/WATER_GOAL)*100);
  return `
  <div class="col">
    <div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:18px">
        <div style="font-size:16px;font-weight:600">Daily hydration</div>
        ${pill(g>=WATER_GOAL?'Goal reached':''+((WATER_GOAL-g)+' to go'),g>=WATER_GOAL?'#16a34a':'#0284c7')}
      </div>
      <div class="row" style="align-items:flex-start;gap:22px;margin-bottom:22px">
        <div style="flex-shrink:0;position:relative;width:72px;height:108px;background:var(--surface2);border-radius:4px 4px 18px 18px;border:1px solid var(--border);overflow:hidden">
          <div style="position:absolute;bottom:0;left:0;right:0;height:${pct}%;background:#0284c730;transition:height .5s"></div>
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:18px;color:#0284c7">${g}</div>
        </div>
        <div style="flex:1">
          <div class="row" style="justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:5px"><span>Progress</span><span>${Math.round(pct)}%</span></div>
          <div class="bar-wrap" style="height:6px;margin-bottom:14px"><div class="bar" style="width:${pct}%;background:#0284c7;height:100%"></div></div>
          <div class="row">
            <button id="water-dec" style="width:36px;height:36px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:18px">−</button>
            <button id="water-inc" class="btn btn-full" style="height:36px;background:#0284c7;flex:1">+ Add glass 💧</button>
          </div>
        </div>
      </div>
      <div class="glasses">
        ${Array.from({length:WATER_GOAL}).map((_,i)=>`<button class="glass-btn" data-i="${i}" style="background:${i<g?'#0284c720':'var(--surface2)'}">${i<g?'💧':''}</button>`).join('')}
      </div>
    </div>
    <div class="card">
      <div style="font-weight:600;font-size:14px;margin-bottom:12px">💡 Tips</div>
      ${['Start your morning with water before coffee','Add lemon or cucumber for a refreshing twist','Set hourly reminders to drink','Carry a visible reusable bottle'].map(t=>`<div class="row" style="padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)"><span style="font-size:16px">💧</span>${t}</div>`).join('')}
    </div>
  </div>`;
}

function mealsView() {
  const meals = state.log.meals||[];
  const total = meals.reduce((s,m)=>s+(m.calories||0),0);
  const GOAL = 2000;
  return `
  <div class="col">
    <div class="card">
      <div style="font-size:16px;font-weight:600;margin-bottom:16px">🥗 Log a meal</div>
      <div class="field" style="margin-bottom:12px"><label class="label">Meal name</label><input id="meal-name" placeholder="e.g. Panner Tikka"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        <div class="field"><label class="label">Calories (kcal)</label><input type="number" id="meal-cal" placeholder="350"></div>
        <div class="field"><label class="label">Type</label><select id="meal-type"><option>Breakfast</option><option selected>Lunch</option><option>Dinner</option><option>Snack</option></select></div>
      </div>
      <button id="meal-add" class="btn btn-success btn-full">+ Add meal</button>
    </div>
    ${meals.length>0?`<div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:10px">
        <div style="font-weight:600;font-size:14px">Today's meals <span style="font-weight:400;color:var(--text2)">(${meals.length})</span></div>
        <span style="font-size:12px;color:var(--text2)">${total} / ${GOAL} kcal</span>
      </div>
      <div class="bar-wrap" style="height:5px;margin-bottom:14px"><div class="bar" style="width:${Math.min(100,(total/GOAL)*100)}%;background:${total>GOAL?'#dc2626':'#16a34a'};height:100%"></div></div>
      ${meals.map((m,i)=>`<div class="item">
        <div style="flex:1"><div class="item-name">${escHtml(m.name)}</div><div class="item-sub">${m.type}</div></div>
        <span style="font-size:12px;color:var(--text2)">${m.calories} kcal</span>
        <button class="meal-rm remove-btn" data-i="${i}">Remove</button>
      </div>`).join('')}
    </div>`:
    `<div class="card"><div class="empty"><div class="empty-icon">🍽️</div>No meals logged yet</div></div>`}
  </div>`;
}

function addMeal() {
  const name = document.getElementById('meal-name')?.value.trim();
  if (!name) return;
  const cal  = parseInt(document.getElementById('meal-cal')?.value) || 0;
  const type = document.getElementById('meal-type')?.value || 'Lunch';
  const time = new Date().toTimeString().slice(0,5);
  const meals = [...(state.log.meals||[]), { name, calories: cal, type, time }];
  saveLog({...state.log, meals});
}

function exerciseView() {
  const ex = state.log.exercise||[];
  const PRESETS = [
    {t:'Running',d:30,k:300},{t:'Swimming',d:45,k:380},{t:'Yoga',d:60,k:200},
    {t:'Weight Training',d:45,k:240},{t:'HIIT',d:20,k:290},{t:'Walking',d:40,k:150},
    {t:'Cycling',d:45,k:340},{t:'Pilates',d:50,k:175}
  ];
  const tMin = ex.reduce((s,e)=>s+(e.duration||0),0);
  const tCal = ex.reduce((s,e)=>s+(e.calories||0),0);
  return `
  <div class="col">
    <div class="card">
      <div style="font-size:16px;font-weight:600;margin-bottom:14px">🏃 Log exercise</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">
        ${PRESETS.map(p=>`<button class="chip ex-preset" data-t="${p.t}" data-d="${p.d}" data-k="${p.k}" style="background:#0d948812;color:#0d9488;border:1px solid #0d948830">${p.t}</button>`).join('')}
      </div>
      <div class="field" style="margin-bottom:12px"><label class="label">Activity name</label><input id="ex-type" placeholder="e.g. Beach volleyball"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        <div class="field"><label class="label">Duration (min)</label><input type="number" id="ex-dur" placeholder="30"></div>
        <div class="field"><label class="label">Calories burned</label><input type="number" id="ex-cal" placeholder="250"></div>
      </div>
      <button id="ex-add" class="btn btn-teal btn-full">+ Add exercise</button>
    </div>
    ${ex.length>0?`<div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:12px">
        <div style="font-weight:600;font-size:14px">Today's activities</div>
        <div class="row" style="gap:6px">${pill(tMin+' min','#0d9488')}${pill(tCal+' kcal','#d97706')}</div>
      </div>
      ${ex.map((e,i)=>`<div class="item">
        <div style="flex:1"><div class="item-name">${escHtml(e.type)}</div><div class="item-sub">${e.category||'Exercise'}</div></div>
        <div style="text-align:right;margin-right:8px"><div style="font-size:13px;color:#0d9488;font-weight:500">${e.duration} min</div><div style="font-size:11px;color:var(--text2)">${e.calories} kcal</div></div>
        <button class="ex-rm remove-btn" data-i="${i}">Remove</button>
      </div>`).join('')}
    </div>`:
    `<div class="card"><div class="empty"><div class="empty-icon">🏋️</div>No activities logged yet</div></div>`}
  </div>`;
}

function addExercise() {
  const type = document.getElementById('ex-type')?.value.trim();
  if (!type) return;
  const dur = parseInt(document.getElementById('ex-dur')?.value) || 0;
  const cal = parseInt(document.getElementById('ex-cal')?.value) || 0;
  const exercise = [...(state.log.exercise||[]), { type, duration: dur, calories: cal, category: 'Cardio', time: new Date().toTimeString().slice(0,5) }];
  saveLog({...state.log, exercise});
}

function bmiView() {
  const saved = state.bmi;
  const SCALE = [['Underweight','< 18.5','#0284c7'],['Normal','18.5–25','#16a34a'],['Overweight','25–30','#d97706'],['Obese','≥ 30','#dc2626']];
  return `
  <div class="col">
    <div class="card">
      <div style="font-size:16px;font-weight:600;margin-bottom:18px">⚖️ BMI Calculator</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        <div class="field"><label class="label">Weight (kg)</label><input type="number" id="bmi-w" placeholder="70" value="${saved?.weight||''}"></div>
        <div class="field"><label class="label">Height (cm)</label><input type="number" id="bmi-h" placeholder="170" value="${saved?.height_cm||''}"></div>
      </div>
      <button id="bmi-calc" class="btn btn-primary btn-full" style="margin-bottom:16px">Calculate BMI</button>
      ${saved?`<div style="padding:20px;border-radius:var(--radius);background:${bmiColor(saved.category)}10;border:1px solid ${bmiColor(saved.category)}30;text-align:center">
        <div style="font-size:52px;font-weight:700;color:${bmiColor(saved.category)}">${saved.bmi.toFixed(1)}</div>
        ${pill(saved.category,bmiColor(saved.category))}
        <div style="font-size:11px;color:var(--text2);margin-top:8px">Last updated ${saved.recorded_date||TODAY}</div>
      </div>`:''}
    </div>
    <div class="card">
      <div style="font-weight:600;font-size:14px;margin-bottom:12px">BMI scale</div>
      ${SCALE.map(([l,r,c])=>`<div style="display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)">
        <div style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0"></div>
        <span style="flex:1;font-size:13px">${l}</span>
        <span style="font-size:12px;color:var(--text2)">${r}</span>
        ${saved?.category===l?pill('You',c):''}
      </div>`).join('')}
      <div style="font-size:11px;color:var(--text3);margin-top:12px">BMI is a screening tool only. Consult a healthcare professional for personalised advice.</div>
    </div>
  </div>`;
}

async function calcBmi() {
  const w = parseFloat(document.getElementById('bmi-w')?.value);
  const h = parseFloat(document.getElementById('bmi-h')?.value) / 100;
  if (!w || !h || h <= 0) return;
  const val = parseFloat((w / (h * h)).toFixed(1));
  const category = val<18.5?'Underweight':val<25?'Normal':val<30?'Overweight':'Obese';
  const bmiData = { bmi: val, weight: w, height_cm: parseFloat(document.getElementById('bmi-h').value), category };
  state.bmi = bmiData; renderApp();
  try { await PUT('/me/bmi', bmiData); }
  catch(e) { alert('Failed to save BMI: ' + e.message); }
}

// ── Dev view ──────────────────────────────────────────────────────────────
const DEV_TABS = ['Overview', 'All users'];

function devView() {
  return `
  <div class="header" style="background:#7c3aed08;border-bottom:1px solid #7c3aed30">
    <div class="header-inner">
      <div class="header-top">
        <div class="row" style="gap:10px">
          ${pill('Developer','#7c3aed')}
          <span style="font-weight:600;font-size:14px">Wellness Admin</span>
        </div>
        <div class="row">
          <div class="row" style="gap:5px;font-size:11px;color:${state.sseConnected?'#16a34a':'#d97706'}">
            <div style="width:6px;height:6px;border-radius:50%;background:currentColor"></div>
            ${state.sseConnected?'Live':'Polling'}
          </div>
          ${state.lastSync?`<span style="font-size:11px;color:var(--text3)">Synced ${state.lastSync}</span>`:''}
          <button id="dev-refresh" style="font-size:12px;color:#7c3aed;background:#7c3aed12;border:1px solid #7c3aed30;border-radius:var(--radius);padding:5px 11px">Refresh</button>
          <button id="logout-btn" style="font-size:12px;color:var(--text2);background:none;padding:4px 8px">Sign out</button>
        </div>
      </div>
      <div class="tabs">
        ${DEV_TABS.map((t,i)=>`<button class="tab${state.devTab===i?' dev-active':''}" data-devtab="${i}">${t}</button>`).join('')}
      </div>
    </div>
  </div>
  <div class="main fade">
    ${state.loading ? `<div style="display:flex;justify-content:center;padding:60px"><div class="spinner"></div></div>` :
      state.devTab===0 ? devOverview() : devUsers()}
  </div>`;
}

function devOverview() {
  const r = state.report;
  const active = r.filter(x=>x.log.water>0||(x.log.meals?.length>0)||(x.log.exercise?.length>0)).length;
  const totalW = r.reduce((s,x)=>s+(x.log.water||0),0);
  const totalM = r.reduce((s,x)=>s+(x.log.meals?.length||0),0);
  const totalE = r.reduce((s,x)=>s+(x.log.exercise||[]).reduce((a,e)=>a+(e.duration||0),0),0);
  const stats = [
    {label:'Total users',val:r.length,color:'#7c3aed'},
    {label:'Active today',val:`${active}/${r.length}`,color:'#16a34a'},
    {label:'Water glasses',val:totalW,color:'#0284c7'},
    {label:'Meals logged',val:totalM,color:'#0d9488'},
    {label:'Exercise mins',val:totalE,color:'#d97706'},
  ];
  return `
  <div class="col">
    <div class="grid grid-4" style="grid-template-columns:repeat(auto-fit,minmax(120px,1fr))">
      ${stats.map(s=>`<div style="background:var(--surface2);border-radius:var(--radius);padding:14px 15px">
        <div style="font-size:22px;font-weight:600;color:${s.color}">${s.val}</div>
        <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-top:3px">${s.label}</div>
      </div>`).join('')}
    </div>
    <div class="card" style="background:var(--surface2);border:none">
      <div style="font-weight:600;margin-bottom:8px;font-size:14px">Real-time sync active</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.6">All user writes broadcast instantly via SSE. Data is server-authoritative — nothing is stored on client devices. All /dev/* endpoints enforce role=dev JWT server-side. Users cannot see each other's data or access this panel.</div>
    </div>
  </div>`;
}

function devUsers() {
  const r = state.report;
  if (!r.length) return `<div class="card"><div class="empty"><div class="empty-icon">👥</div>No users registered yet</div></div>`;
  return `<div class="col">
    ${r.map(x => {
      const {user:u,log,bmi,streak} = x;
      const hasData = log.water>0||(log.meals?.length>0)||(log.exercise?.length>0);
      const mCal = (log.meals||[]).reduce((s,m)=>s+(m.calories||0),0);
      const eMin = (log.exercise||[]).reduce((s,e)=>s+(e.duration||0),0);
      const wPct = Math.min(100,Math.round(((log.water||0)/WATER_GOAL)*100));
      return `<div class="card">
        <div class="row" style="margin-bottom:14px;padding-bottom:13px;border-bottom:1px solid var(--border)">
          <div class="avatar" style="background:#7c3aed18;color:#7c3aed">${escHtml(u.name[0].toUpperCase())}</div>
          <div style="flex:1">
            <div style="font-weight:600;font-size:14px">${escHtml(u.name)}</div>
            <div style="font-size:11px;color:var(--text2)">Joined ${u.joined}${streak>0?' · 🔥 '+streak+'-day streak':''}</div>
          </div>
          ${pill(hasData?'Active today':'No data',hasData?'#16a34a':'#94a3b8')}
          <button class="dev-delete-btn" data-uid="${u.id}" data-uname="${escHtml(u.name)}" style="font-size:11px;color:#dc2626;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:4px 10px;cursor:pointer">🗑️ Delete</button>
        </div>
        <div class="grid" style="grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
          ${[
            {l:'Water',v:`${log.water||0}/${WATER_GOAL}`,c:'#0284c7'},
            {l:'Meals',v:(log.meals||[]).length,s:mCal+'kcal',c:'#16a34a'},
            {l:'Exercise',v:eMin+'m',c:'#0d9488'},
            {l:'BMI',v:bmi?bmi.bmi.toFixed(1):'—',s:bmi?.category,c:bmiColor(bmi?.category)},
          ].map(s=>`<div style="background:var(--surface2);border-radius:var(--radius);padding:9px 10px;text-align:center">
            <div style="font-size:15px;font-weight:600;color:${s.c}">${s.v}</div>
            ${s.s?`<div style="font-size:10px;color:var(--text2)">${s.s}</div>`:''}
            <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px">${s.l}</div>
          </div>`).join('')}
        </div>
        <div class="bar-wrap" style="margin-bottom:10px"><div class="bar" style="width:${wPct}%;background:#0284c7;height:100%"></div></div>
        ${(log.meals||[]).length?`<div style="margin-bottom:8px"><div class="label" style="margin-bottom:4px">Meals</div><div style="display:flex;flex-wrap:wrap;gap:4px">${log.meals.map(m=>`<span style="padding:2px 8px;border-radius:5px;background:var(--surface2);border:1px solid var(--border);font-size:11px">${escHtml(m.name)} · ${m.calories}kcal</span>`).join('')}</div></div>`:''}
        ${(log.exercise||[]).length?`<div><div class="label" style="margin-bottom:4px">Exercise</div><div style="display:flex;flex-wrap:wrap;gap:4px">${log.exercise.map(e=>`<span style="padding:2px 8px;border-radius:5px;background:#0d948812;border:1px solid #0d948830;font-size:11px;color:#0d9488">${escHtml(e.type)} · ${e.duration}min</span>`).join('')}</div></div>`:''}
        ${!hasData?`<div style="text-align:center;font-size:12px;color:var(--text2);padding:6px 0">No data logged today.</div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

function bindDev() {
  document.querySelectorAll('[data-devtab]').forEach(el => {
    el.addEventListener('click', () => setState({ devTab: +el.dataset.devtab }));
  });
  document.getElementById('logout-btn')?.addEventListener('click', doLogout);
  document.getElementById('dev-refresh')?.addEventListener('click', () => loadDevReport().then(renderApp));
  document.querySelectorAll('.dev-delete-btn').forEach(el => {
    el.addEventListener('click', async () => {
      const uid = el.dataset.uid;
      const uname = el.dataset.uname;
      if (!confirm(`Are you sure you want to delete user "${uname}"?\nThis will permanently delete all their data.`)) return;
      try {
        await DEL('/dev/users/' + uid);
        await loadDevReport();
        renderApp();
      } catch(e) { alert('Failed to delete: ' + e.message); }
    });
  });
}

async function loadDevReport() {
  state.loading = true;
  try {
    const data = await GET('/dev/report');
    state.report  = data || [];
    state.lastSync = new Date().toLocaleTimeString();
  } catch(e) { console.error(e); }
  state.loading = false;
}

// SSE for real-time dev updates
let sseInstance = null;
function startSSE() {
  if (sseInstance) { sseInstance.close(); }
  const token = Auth.get();
  try {
    const es = new EventSource(`${API_BASE}/api/dev/events?token=${encodeURIComponent(token)}`);
    es.onopen    = () => { state.sseConnected = true; renderApp(); };
    es.onmessage = () => { loadDevReport().then(renderApp); };
    es.onerror   = () => { state.sseConnected = false; sseInstance = null; startSSEPoll(); };
    sseInstance  = es;
  } catch { startSSEPoll(); }
}
let pollTimer = null;
function startSSEPoll() {
  clearInterval(pollTimer);
  pollTimer = setInterval(() => { if (Auth.ok() && Auth.isDev()) loadDevReport().then(renderApp); }, 8000);
}

async function doLogout() {
  try { await DEL('/auth/logout'); } catch {}
  Auth.clear();
  if (sseInstance) { sseInstance.close(); sseInstance = null; }
  clearInterval(pollTimer);
  setState({ view:'auth', authMode:'login', authErr:'', tab:0, devTab:0, log:{water:0,meals:[],exercise:[]}, bmi:null, streak:0, report:[] });
}

// ── Auto-refresh at midnight ──────────────────────────────────────────────
function scheduleMidnightRefresh() {
  const now = new Date();
  const midnight = new Date(now);
  midnight.setHours(24, 0, 1, 0);
  const msUntilMidnight = midnight - now;
  setTimeout(async () => {
    if (Auth.ok() && !Auth.isDev()) {
      await loadUserData();
      renderApp();
    }
    scheduleMidnightRefresh();
  }, msUntilMidnight);
}
scheduleMidnightRefresh();

// ── Boot ──────────────────────────────────────────────────────────────────
renderApp();
</script>
</body>
