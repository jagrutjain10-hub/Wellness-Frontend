<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wellness Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --secondary: #06b6d4;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --teal: #14b8a6;
  --purple: #8b5cf6;

  --bg: #f9fafb;
  --surface: #ffffff;
  --surface2: #f3f4f6;
  --surface3: #e5e7eb;
  --border: #e5e7eb;
  --text: #111827;
  --text2: #6b7280;
  --text3: #9ca3af;

  --radius: 12px;
  --radius-lg: 18px;
  --radius-xl: 24px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 8px 32px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.10), 0 16px 48px rgba(0,0,0,.08);

  --grad-primary: linear-gradient(135deg, #6366f1, #06b6d4);
  --grad-green: linear-gradient(135deg, #10b981, #06b6d4);
  --grad-orange: linear-gradient(135deg, #f59e0b, #ef4444);
  --grad-purple: linear-gradient(135deg, #8b5cf6, #6366f1);
  --grad-teal: linear-gradient(135deg, #14b8a6, #06b6d4);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #252836;
    --surface3: #2d3142;
    --border: #2d3142;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --text3: #475569;
    --shadow: 0 1px 3px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.2);
    --shadow-md: 0 4px 12px rgba(0,0,0,.4), 0 8px 32px rgba(0,0,0,.3);
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

input, select, textarea {
  font-family: inherit;
  font-size: 14px;
  padding: 11px 14px;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  outline: none;
  width: 100%;
  transition: all .2s;
}
input:focus, select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(99,102,241,.1);
  background: var(--surface);
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  transition: all .2s;
  font-weight: 500;
}
button:active { transform: scale(.97); }

@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes shimmer { from { background-position: -200% 0; } to { background-position: 200% 0; } }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

.fade { animation: fadeUp .3s cubic-bezier(.16,1,.3,1); }
.spinner {
  width: 24px; height: 24px;
  border: 2.5px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}

/* ── Auth Page ── */
.auth-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
.auth-page::before {
  content: '';
  position: fixed;
  top: -30%;
  right: -20%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(99,102,241,.12) 0%, transparent 70%);
  pointer-events: none;
}
.auth-page::after {
  content: '';
  position: fixed;
  bottom: -20%;
  left: -10%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(6,182,212,.08) 0%, transparent 70%);
  pointer-events: none;
}
.auth-card {
  background: var(--surface);
  border-radius: var(--radius-xl);
  border: 1.5px solid var(--border);
  padding: 36px 32px;
  width: 100%;
  max-width: 400px;
  box-shadow: var(--shadow-lg);
  position: relative;
  z-index: 1;
}
.auth-logo {
  width: 52px; height: 52px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 14px;
  font-size: 24px;
}
.auth-title {
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 4px;
  letter-spacing: -.3px;
}
.auth-sub {
  font-size: 13px;
  color: var(--text2);
  text-align: center;
  margin-bottom: 28px;
}

/* ── Header ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.header-inner { max-width: 900px; margin: 0 auto; padding: 0 16px; }
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
}
.logo-text {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -.3px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-icon {
  width: 30px; height: 30px;
  background: var(--grad-primary);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
}

/* ── Tabs ── */
.tabs {
  display: flex;
  overflow-x: auto;
  gap: 0;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 500;
  background: none;
  border: none;
  border-bottom: 2.5px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  color: var(--text2);
  transition: all .2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab.dev-active { color: var(--purple); border-bottom-color: var(--purple); }

/* ── Main ── */
.main { max-width: 900px; margin: 0 auto; padding: 20px 16px 80px; }
.col { display: flex; flex-direction: column; gap: 14px; }
.grid { display: grid; gap: 12px; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
.row { display: flex; align-items: center; gap: 10px; }

/* ── Cards ── */
.card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1.5px solid var(--border);
  padding: 20px;
  box-shadow: var(--shadow);
}
.card-sm { padding: 14px 16px; }

/* ── Stat Cards ── */
.stat-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1.5px solid var(--border);
  padding: 16px;
  cursor: pointer;
  transition: all .2s;
  box-shadow: var(--shadow);
}
.stat-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: var(--primary);
}
.stat-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  margin-bottom: 10px;
}
.stat-val { font-size: 24px; font-weight: 700; letter-spacing: -.5px; }
.stat-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.stat-label { font-size: 11px; color: var(--text3); margin-top: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; }

/* ── Progress Bar ── */
.progress-wrap {
  height: 6px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: hidden;
  margin-top: 10px;
}
.progress-bar {
  height: 100%;
  border-radius: 99px;
  transition: width .6s cubic-bezier(.16,1,.3,1);
}

/* ── Gradient Cards ── */
.grad-card {
  border-radius: var(--radius-lg);
  padding: 20px;
  color: #fff;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-md);
}
.grad-card::after {
  content: '';
  position: absolute;
  top: -20px; right: -20px;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: rgba(255,255,255,.12);
}
.grad-card::before {
  content: '';
  position: absolute;
  bottom: -30px; left: -10px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: rgba(255,255,255,.06);
}
.grad-card-val { font-size: 30px; font-weight: 700; letter-spacing: -.5px; position: relative; z-index: 1; }
.grad-card-label { font-size: 12px; opacity: .85; margin-top: 4px; position: relative; z-index: 1; font-weight: 500; }
.grad-card-sub { font-size: 11px; opacity: .65; margin-top: 3px; position: relative; z-index: 1; }

/* ── Buttons ── */
.btn {
  padding: 12px 24px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all .2s;
  cursor: pointer;
  border: none;
}
.btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--grad-primary); color: #fff; }
.btn-success { background: var(--grad-green); color: #fff; }
.btn-teal { background: var(--grad-teal); color: #fff; }
.btn-ghost { background: var(--surface2); color: var(--text2); border: 1.5px solid var(--border); }
.btn-ghost:hover { background: var(--surface3); color: var(--text); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-dev { background: var(--grad-purple); color: #fff; }
.btn-full { width: 100%; }
.btn-sm { padding: 8px 14px; font-size: 12px; border-radius: 8px; }

/* ── Pill / Badge ── */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .02em;
}

/* ── Field ── */
.field { display: flex; flex-direction: column; gap: 6px; }
.label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .07em;
}

/* ── Alert ── */
.alert {
  padding: 12px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.alert-error { background: #fef2f2; color: #b91c1c; border: 1.5px solid #fecaca; }
.alert-success { background: #f0fdf4; color: #15803d; border: 1.5px solid #bbf7d0; }

/* ── List Items ── */
.item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.item:last-child { border-bottom: none; }
.item-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.item-name { font-weight: 600; font-size: 13px; }
.item-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
.remove-btn {
  font-size: 11px;
  color: var(--danger);
  background: #fef2f250;
  border: 1px solid #fecaca;
  border-radius: 6px;
  padding: 4px 10px;
  flex-shrink: 0;
  font-weight: 500;
}

/* ── Water glasses ── */
.glasses { display: flex; flex-wrap: wrap; gap: 8px; }
.glass-btn {
  width: 44px; height: 52px;
  border-radius: 4px 4px 12px 12px;
  border: 1.5px solid rgba(6,182,212,.3);
  font-size: 16px;
  cursor: pointer;
  transition: all .2s;
  background: var(--surface2);
}
.glass-btn.filled { background: rgba(6,182,212,.15); border-color: rgba(6,182,212,.5); }
.glass-btn:hover { transform: scale(1.05); }

/* ── Preset chips ── */
.chip {
  padding: 7px 14px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
  border: 1.5px solid transparent;
}
.chip:hover { transform: scale(1.03); }

/* ── Section header ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.section-title { font-size: 16px; font-weight: 700; letter-spacing: -.2px; }
.section-sub { font-size: 12px; color: var(--text2); }

/* ── Avatar ── */
.avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 15px;
  flex-shrink: 0;
}

/* ── Empty ── */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text2);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.empty-sub { font-size: 13px; }

/* ── Tab selector (analytics) ── */
.tab-selector {
  display: flex;
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 4px;
  gap: 4px;
  margin-bottom: 16px;
}
.tab-sel-btn {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  background: none;
  color: var(--text2);
  transition: all .2s;
}
.tab-sel-btn.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}

/* ── Chart bars ── */
.mini-chart { width: 100%; height: 120px; }
.chart-bar-wrap {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 100%;
  padding-top: 8px;
}
.chart-bar {
  flex: 1;
  border-radius: 4px 4px 0 0;
  transition: height .5s cubic-bezier(.16,1,.3,1);
  min-height: 3px;
  cursor: pointer;
  position: relative;
}
.chart-bar:hover::after {
  content: attr(data-val);
  position: absolute;
  top: -26px; left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  background: var(--text);
  color: var(--bg);
  padding: 3px 7px;
  border-radius: 5px;
  white-space: nowrap;
  font-family: 'DM Mono', monospace;
}
.chart-labels { display: flex; gap: 4px; margin-top: 6px; }
.chart-label { flex: 1; text-align: center; font-size: 9px; color: var(--text3); font-weight: 500; }

/* ── Heatmap ── */
.heatmap { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
.heatmap-cell {
  aspect-ratio: 1;
  border-radius: 4px;
  cursor: pointer;
  transition: transform .1s;
}
.heatmap-cell:hover { transform: scale(1.2); }

/* ── Insight cards ── */
.insight-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  box-shadow: var(--shadow);
}
.insight-icon { font-size: 22px; flex-shrink: 0; }
.insight-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
.insight-text { font-size: 13px; color: var(--text2); line-height: 1.5; }
.insight-text strong { color: var(--text); font-weight: 600; }

/* ── Achievement cards ── */
.achievement-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 14px;
  text-align: center;
  transition: all .2s;
  box-shadow: var(--shadow);
}
.achievement-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
}
.achievement-icon { font-size: 32px; margin-bottom: 10px; }
.achievement-val { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
.achievement-label { font-size: 10px; color: var(--text2); margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
.achievement-date { font-size: 10px; color: var(--text3); margin-top: 4px; }

/* ── Greeting card ── */
.greeting-card {
  background: var(--grad-primary);
  border-radius: var(--radius-xl);
  padding: 24px 20px;
  color: #fff;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}
.greeting-card::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 160px; height: 160px;
  border-radius: 50%;
  background: rgba(255,255,255,.08);
}
.greeting-card::after {
  content: '';
  position: absolute;
  bottom: -60px; left: -20px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: rgba(255,255,255,.05);
}

/* ── Water fill animation ── */
.water-bottle {
  position: relative;
  width: 80px; height: 120px;
  border-radius: 6px 6px 20px 20px;
  border: 2px solid rgba(6,182,212,.4);
  overflow: hidden;
  background: var(--surface2);
  flex-shrink: 0;
}
.water-fill {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(180deg, rgba(6,182,212,.5), rgba(6,182,212,.8));
  transition: height .6s cubic-bezier(.16,1,.3,1);
  border-radius: 0 0 18px 18px;
}
.water-count {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 700;
  color: #0891b2;
  z-index: 1;
}

/* ── Dev header ── */
.dev-header {
  background: linear-gradient(135deg, #1e1b4b, #312e81);
  border-bottom: 1px solid rgba(139,92,246,.3);
}

/* ── Scrollbar hide ── */
.tabs::-webkit-scrollbar { display: none; }

@media (max-width: 480px) {
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .grad-card-val { font-size: 24px; }
  .greeting-card { padding: 20px 16px; }
}

</style>
</head>
<body>
<div id="app"></div>
<script>

const API_BASE = window.WELLNESS_API || 'https://wellness-backend-59u8.onrender.com';
function getToday(){return new Date().toISOString().split('T')[0];}
const TODAY=getToday();
const WATER_GOAL=8;

const Auth=(()=>{
  let _token=null,_user=null;
  return{
    set(t,u){_token=t;_user=u;},
    get(){return _token;},
    user(){return _user;},
    clear(){_token=null;_user=null;},
    ok(){return !!_token;},
    isDev(){return _user?.role==='dev';}
  };
})();

async function api(method,path,body){
  const headers={'Content-Type':'application/json'};
  if(Auth.get())headers['Authorization']=`Bearer ${Auth.get()}`;
  const res=await fetch(API_BASE+'/api'+path,{method,headers,body:body?JSON.stringify(body):undefined});
  if(res.status===204)return null;
  const data=await res.json();
  if(res.status===401&&path.includes('/auth/')){throw new Error(data.message||'Invalid name or password');}
  if(res.status===401){Auth.clear();renderApp();return null;}
  if(!res.ok)throw new Error(data.message||'Request failed');
  return data;
}
const GET=p=>api('GET',p);
const POST=(p,b)=>api('POST',p,b);
const PUT=(p,b)=>api('PUT',p,b);
const DEL=p=>api('DELETE',p);

let state={
  view:'auth',authMode:'login',authErr:'',authLoading:false,
  tab:0,devTab:0,analyticsTab:0,
  log:{water:0,meals:[],exercise:[]},
  bmi:null,streak:0,report:[],
  loading:true,syncing:false,lastSync:null,sseConnected:false,
  weeklyLogs:[],monthlyLogs:[],bests:null,analyticsLoading:false,
};

function setState(patch){
  Object.assign(state,patch);
  renderApp();
  setTimeout(() => {
    const tabsContainer = document.querySelector('.tabs');
    const activeTab = document.querySelector('.tab.active, .tab.dev-active');
    if(tabsContainer && activeTab) {
      const containerLeft = tabsContainer.getBoundingClientRect().left;
      const tabLeft = activeTab.getBoundingClientRect().left;
      const tabWidth = activeTab.offsetWidth;
      const containerWidth = tabsContainer.offsetWidth;
      const targetScroll = tabsContainer.scrollLeft + tabLeft - containerLeft - (containerWidth / 2) + (tabWidth / 2);
      tabsContainer.scrollTo({left: targetScroll, behavior: 'smooth'});
    }
  }, 30);
}
const app=document.getElementById('app');
function renderApp(){
  if(!Auth.ok()){app.innerHTML=authView();bindAuth();return;}
  if(Auth.isDev()){app.innerHTML=devView();bindDev();return;}
  app.innerHTML=userView();bindUser();
}

function pill(txt,color){return `<span class="pill" style="background:${color}18;color:${color};border:1px solid ${color}30">${txt}</span>`;}
function bmiColor(cat){return{Underweight:'#0284c7',Normal:'#16a34a',Overweight:'#d97706',Obese:'#dc2626'}[cat]||'#64748b';}
function greet(){const h=new Date().getHours();return h<12?'Good morning':h<17?'Good afternoon':'Good evening';}
function fmtDate(){return new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtShortDate(ds){const d=new Date(ds);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function dayName(ds){return new Date(ds+'T00:00:00').toLocaleDateString('en-US',{weekday:'short'});}

function bindAuth(){
  const q=id=>document.getElementById(id);
  const setMode=m=>{setState({authMode:m,authErr:''});};
  q('go-login')&&q('go-login').addEventListener('click',()=>setMode('login'));
  q('go-register')&&q('go-register').addEventListener('click',()=>setMode('register'));
  q('go-dev')&&q('go-dev').addEventListener('click',()=>setMode('dev'));
  q('auth-submit').addEventListener('click',doAuth);
  ['auth-name','auth-pass'].forEach(id=>{q(id)&&q(id).addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});});
}

async function doAuth(){
  const m=state.authMode;
  const name=(document.getElementById('auth-name')?.value||'').trim();
  const pass=(document.getElementById('auth-pass')?.value||'').trim();
  state.authLoading=true;state.authErr='';renderApp();
  try{
    let data;
    if(m==='dev')data=await POST('/auth/dev/login',{password:pass});
    else if(m==='register')data=await POST('/auth/register',{name,password:pass});
    else data=await POST('/auth/login',{name,password:pass});
    if(!data)throw new Error('Could not connect to server. Please try again.');
    Auth.set(data.token,data.user);
    state.authLoading=false;
    if(Auth.isDev()){state.devTab=0;await loadDevReport();startSSE();renderApp();}
    else{state.tab=0;await loadUserData();renderApp();}
  }catch(e){setState({authLoading:false,authErr:e.message});}
}

async function loadUserData(){
  state.loading=true;
  try{
    const[log,bmi,streak]=await Promise.all([GET(`/me/log/${getToday()}`),GET('/me/bmi'),GET('/me/streak')]);
    state.log=log||{water:0,meals:[],exercise:[]};
    state.bmi=bmi||null;
    state.streak=streak?.streak||0;
  }catch(e){console.error(e);}
  state.loading=false;
}

async function loadAnalytics(){
  if(state.analyticsLoading)return;
  state.analyticsLoading=true;renderApp();
  try{
    const[weekly,monthly,bests]=await Promise.all([
      GET('/me/logs/range?days=7'),
      GET('/me/logs/range?days=30'),
      GET('/me/bests'),
    ]);
    state.weeklyLogs=weekly||[];
    state.monthlyLogs=monthly||[];
    state.bests=bests||null;
  }catch(e){console.error(e);}
  state.analyticsLoading=false;renderApp();
}

async function saveLog(newLog){
  state.log=newLog;renderApp();
  try{await PUT(`/me/log/${getToday()}`,newLog);}
  catch(e){alert('Save failed: '+e.message);loadUserData().then(renderApp);}
}

function bindUser(){
  document.querySelectorAll('[data-tab]').forEach(el=>{el.addEventListener('click',()=>{

    setState({tab:t});
    if(t===5&&!state.weeklyLogs.length)loadAnalytics();
  });});
  document.querySelectorAll('[data-stat-tab]').forEach(el=>{el.addEventListener('click',()=>setState({tab:+el.dataset.statTab}));});
  document.getElementById('logout-btn')?.addEventListener('click',doLogout);
  document.getElementById('water-inc')?.addEventListener('click',()=>{saveLog({...state.log,water:Math.min(20,(state.log.water||0)+1)});});
  document.getElementById('water-dec')?.addEventListener('click',()=>{saveLog({...state.log,water:Math.max(0,(state.log.water||0)-1)});});
  document.querySelectorAll('.glass-btn').forEach(el=>{el.addEventListener('click',()=>{const i=+el.dataset.i,g=state.log.water||0;saveLog({...state.log,water:i<g?i:i+1});});});

  document.getElementById('meal-name')?.addEventListener('keydown',e=>{if(e.key==='Enter')addMeal();});
  document.querySelectorAll('.meal-rm').forEach(el=>{el.addEventListener('click',()=>{const meals=[...(state.log.meals||[])];meals.splice(+el.dataset.i,1);saveLog({...state.log,meals});});});
  document.querySelectorAll('.ex-preset').forEach(el=>{el.addEventListener('click',()=>{document.getElementById('ex-type').value=el.dataset.t;document.getElementById('ex-dur').value=el.dataset.d;document.getElementById('ex-cal').value=el.dataset.k;});});
  document.getElementById('ex-add')?.addEventListener('click',addExercise);
  document.querySelectorAll('.ex-rm').forEach(el=>{el.addEventListener('click',()=>{const exercise=[...(state.log.exercise||[])];exercise.splice(+el.dataset.i,1);saveLog({...state.log,exercise});});});
  document.getElementById('bmi-calc')?.addEventListener('click',calcBmi);

  // Analytics bindings
  document.querySelectorAll('[data-atab]').forEach(el=>{el.addEventListener('click',()=>setState({analyticsTab:+el.dataset.atab}));});
  document.getElementById('export-pdf')?.addEventListener('click',exportPDF);
  document.getElementById('refresh-analytics')?.addEventListener('click',()=>{state.weeklyLogs=[];state.monthlyLogs=[];state.bests=null;loadAnalytics();});
}

}

        <div style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0"></div>
        <span style="flex:1;font-size:13px">${l}</span>
        <span style="font-size:12px;color:var(--text2)">${r}</span>
        ${saved?.category===l?pill('You',c):''}
      </div>`).join('')}
      <div style="font-size:11px;color:var(--text3);margin-top:12px">BMI is a screening tool only. Consult a healthcare professional for personalised advice.</div>
    </div>
  </div>`;
}

async function calcBmi(){
  const w=parseFloat(document.getElementById('bmi-w')?.value);
  const h=parseFloat(document.getElementById('bmi-h')?.value)/100;
  if(!w||!h||h<=0)return;
  const val=parseFloat((w/(h*h)).toFixed(1));
  const category=val<18.5?'Underweight':val<25?'Normal':val<30?'Overweight':'Obese';
  const bmiData={bmi:val,weight:w,height_cm:parseFloat(document.getElementById('bmi-h').value),category};
  state.bmi=bmiData;renderApp();
  try{await PUT('/me/bmi',bmiData);}
  catch(e){alert('Failed to save BMI: '+e.message);}
}

// ── Weekly View ───────────────────────────────────────────────────────────
function weeklyView(){
  const logs=state.weeklyLogs;

  const avgWater=(logs.reduce((s,l)=>s+(l.water||0),0)/logs.length).toFixed(1);
  const totalExMins=logs.reduce((s,l)=>s+(l.exercise||[]).reduce((a,e)=>a+(e.duration||0),0),0);
  const totalCalBurned=logs.reduce((s,l)=>s+(l.exercise||[]).reduce((a,e)=>a+(e.calories||0),0),0);
  const totalMeals=logs.reduce((s,l)=>s+(l.meals||[]).length,0);
  const activeDays=logs.filter(l=>l.water>0||(l.meals||[]).length>0||(l.exercise||[]).length>0).length;
  const consistency=Math.round((activeDays/7)*100);
  const workoutDays=logs.filter(l=>(l.exercise||[]).length>0).length;

  // Find most active day
  let mostActiveDay='';let maxActivity=0;
  logs.forEach(l=>{
    const score=(l.water||0)*2+(l.meals||[]).length*3+(l.exercise||[]).reduce((s,e)=>s+(e.duration||0),0);

    </div>

    <!-- Water chart -->

function insightsView(){
  const weekly=state.weeklyLogs;
  const monthly=state.monthlyLogs;
  const bests=state.bests;
  if(!weekly.length)return`<div class="card"><div class="empty"><div class="empty-icon">💡</div>Not enough data for insights yet. Log for a few days!</div></div>`;

  const insights=generateInsights(weekly,monthly,bests);

  return`
  <div class="col">
    <div class="card" style="background:linear-gradient(135deg,#2563eb08,#0d948808);border-color:#2563eb20">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:32px">🧠</div>
        <div>
          <div style="font-size:16px;font-weight:600">Smart Insights</div>
          <div style="font-size:12px;color:var(--text2)">Personalized based on your data</div>
        </div>
      </div>
    </div>
    <div class="col" style="gap:8px">
      ${insights.map(i=>`
        <div class="insight-card">
          <div class="insight-icon">${i.icon}</div>
          <div>
            <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px">${i.title}</div>
            <div class="insight-text">${i.text}</div>
          </div>
        </div>
      `).join('')}
    </div>
  </div>`;

function generateInsights(weekly,monthly,bests){
  const insights=[];

  if(weekly.length>0){
    const avgWater=(weekly.reduce((s,l)=>s+(l.water||0),0)/weekly.length);
    const pct=Math.round((avgWater/WATER_GOAL)*100);

    if(avgWater>=WATER_GOAL){
      insights.push({icon:'💧',title:'Great hydration!',text:`You averaged <strong>${avgWater.toFixed(1)} glasses</strong> per day this week — hitting your daily goal consistently!`});
    } else {
      insights.push({icon:'💧',title:'Hydration needs work',text:`You averaged <strong>${avgWater.toFixed(1)} glasses</strong> per day this week — that's ${pct}% of your goal. Try to drink more water!`});
    }

    const workoutDays=weekly.filter(l=>(l.exercise||[]).length>0).length;
    if(workoutDays>=5){insights.push({icon:'🏃',title:'Excellent workout frequency!',text:`You exercised <strong>${workoutDays} out of 7 days</strong> this week. That's outstanding consistency!`});}
    else if(workoutDays>=3){insights.push({icon:'🏃',title:'Good workout habit',text:`You exercised <strong>${workoutDays} out of 7 days</strong> this week. Try to add 1-2 more sessions next week!`});}
    else if(workoutDays>0){insights.push({icon:'🏃',title:'Getting started with exercise',text:`You exercised <strong>${workoutDays} day(s)</strong> this week. Consistency is key — try to exercise every other day!`});}
    else{insights.push({icon:'🏃',title:'No exercise this week',text:'You haven\'t logged any exercise this week. Even a 20-minute walk counts!'});}

    const mealDays=weekly.filter(l=>(l.meals||[]).length>0).length;
    const avgMeals=(weekly.reduce((s,l)=>s+(l.meals||[]).length,0)/weekly.length).toFixed(1);
    if(mealDays<4){insights.push({icon:'🥗',title:'Track your meals more',text:`You only logged meals on <strong>${mealDays} days</strong> this week. Tracking helps you understand your calorie intake better.`});}
    else{insights.push({icon:'🥗',title:'Good meal tracking',text:`You logged an average of <strong>${avgMeals} meals per day</strong> — keep it up to maintain awareness of your nutrition!`});}

    // Weekend vs weekday analysis
    const weekendLogs=weekly.filter(l=>{const day=new Date(l.date+'T00:00:00').getDay();return day===0||day===6;});
    const weekdayLogs=weekly.filter(l=>{const day=new Date(l.date+'T00:00:00').getDay();return day!==0&&day!==6;});
    if(weekendLogs.length>0&&weekdayLogs.length>0){
      const wkndWater=weekendLogs.reduce((s,l)=>s+(l.water||0),0)/weekendLogs.length;
      const wkdyWater=weekdayLogs.reduce((s,l)=>s+(l.water||0),0)/weekdayLogs.length;
      if(wkndWater<wkdyWater-1){insights.push({icon:'📅',title:'Weekend hydration dips',text:`You drink <strong>${(wkdyWater-wkndWater).toFixed(1)} fewer glasses</strong> on weekends. Try to maintain your routine on weekends too!`});}
      else if(wkdyWater<wkndWater-1){insights.push({icon:'📅',title:'Weekday hydration dips',text:`You drink <strong>${(wkndWater-wkdyWater).toFixed(1)} fewer glasses</strong> on weekdays. Stay hydrated at work or school!`});}
    }

    const totalExMins=weekly.reduce((s,l)=>s+(l.exercise||[]).reduce((a,e)=>a+(e.duration||0),0),0);
    if(totalExMins>=150){insights.push({icon:'⭐',title:'WHO recommendation achieved!',text:`You hit <strong>${totalExMins} minutes</strong> of exercise this week — exceeding the WHO recommended 150 minutes. Fantastic!`});}
    else if(totalExMins>0){insights.push({icon:'💪',title:'Keep building exercise time',text:`You logged <strong>${totalExMins} minutes</strong> of exercise this week. The WHO recommends 150 minutes — you're ${Math.round((totalExMins/150)*100)}% there!`});}
  }

  if(bests){
    if(bests.longestStreak>=7){insights.push({icon:'🔥',title:'Streak champion!',text:`Your longest streak is <strong>${bests.longestStreak} days</strong>. Your consistency is impressive — keep the momentum going!`});}
    if(bests.totalDaysLogged>=14){insights.push({icon:'📊',title:'Building great data',text:`With <strong>${bests.totalDaysLogged} days</strong> of data, your insights will become more accurate over time. Keep logging!`});}
  }

  if(insights.length===0){insights.push({icon:'💡',title:'Keep logging!',text:'Log your meals, water and exercise daily for personalized insights to appear here.'});}

  return insights;
}


// ── Export User PDF (for dev) ─────────────────────────────────────────────
async function exportUserPDF(uname, log, streak, bmi) {
  try {
    const {jsPDF} = window.jspdf;
    const doc = new jsPDF();
    const today = new Date().toLocaleDateString();

    // Header
    doc.setFillColor(124, 58, 237);
    doc.rect(0, 0, 210, 35, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(20); doc.setFont('helvetica', 'bold');
    doc.text('🌿 Wellness Report', 15, 18);
    doc.setFontSize(10); doc.setFont('helvetica', 'normal');
    doc.text('User: ' + uname + '  ·  Generated by Dev on ' + today, 15, 27);

    let y = 50;
    doc.setTextColor(15, 23, 42);

    // Today summary
    doc.setFontSize(14); doc.setFont('helvetica', 'bold');
    doc.text('Today Summary', 15, y); y += 8;
    doc.setFontSize(10); doc.setFont('helvetica', 'normal');
    doc.setTextColor(71, 85, 105);

    const meals = log.meals || [];
    const exercise = log.exercise || [];
    const water = log.water || 0;
    const totalCal = meals.reduce((s, m) => s + (m.calories || 0), 0);
    const totalExMins = exercise.reduce((s, e) => s + (e.duration || 0), 0);
    const totalExCal = exercise.reduce((s, e) => s + (e.calories || 0), 0);

    const summaryLines = [
      '• Water intake: ' + water + ' / ' + WATER_GOAL + ' glasses (' + Math.round((water/WATER_GOAL)*100) + '%)',
      '• Meals logged: ' + meals.length + ' meals (' + totalCal + ' kcal consumed)',
      '• Exercise: ' + exercise.length + ' activities (' + totalExMins + ' min, ' + totalExCal + ' kcal burned)',
      '• Current streak: ' + streak + ' days',
    ];
    summaryLines.forEach(l => { doc.text(l, 15, y); y += 7; });

    if (bmi) {
      y += 3;
      doc.setTextColor(15, 23, 42);
      doc.setFontSize(14); doc.setFont('helvetica', 'bold');
      doc.text('BMI Information', 15, y); y += 8;
      doc.setFontSize(10); doc.setFont('helvetica', 'normal');
      doc.setTextColor(71, 85, 105);
      doc.text('• BMI: ' + bmi.bmi.toFixed(1) + ' (' + bmi.category + ')', 15, y); y += 7;
      doc.text('• Weight: ' + bmi.weight + ' kg  ·  Height: ' + bmi.height_cm + ' cm', 15, y); y += 7;
      doc.text('• Last recorded: ' + (bmi.recorded_date || 'N/A'), 15, y); y += 7;
    }

    if (meals.length > 0) {
      y += 3;
      doc.setTextColor(15, 23, 42);
      doc.setFontSize(14); doc.setFont('helvetica', 'bold');
      doc.text('Meals Today', 15, y); y += 8;
      doc.setFontSize(10); doc.setFont('helvetica', 'normal');
      doc.setTextColor(71, 85, 105);
      meals.forEach(m => { doc.text('• ' + m.name + ' (' + m.type + ') — ' + m.calories + ' kcal', 15, y); y += 7; });
    }

    if (exercise.length > 0) {
      y += 3;
      doc.setTextColor(15, 23, 42);
      doc.setFontSize(14); doc.setFont('helvetica', 'bold');
      doc.text('Exercise Today', 15, y); y += 8;
      doc.setFontSize(10); doc.setFont('helvetica', 'normal');
      doc.setTextColor(71, 85, 105);
      exercise.forEach(e => { doc.text('• ' + e.type + ' — ' + e.duration + ' min, ' + e.calories + ' kcal', 15, y); y += 7; });
    }

    // Footer
    doc.setTextColor(148, 163, 184);
    doc.setFontSize(9);
    doc.text('Generated by Wellness Tracker Dev Dashboard · Confidential', 15, 285);

    doc.save('wellness-' + uname.toLowerCase().replace(/\s+/g,'-') + '-' + new Date().toISOString().split('T')[0] + '.pdf');
  } catch(e) { alert('PDF export failed: ' + e.message); }
}

      const totalCalBurned=monthly.reduce((s,l)=>s+(l.exercise||[]).reduce((a,e)=>a+(e.calories||0),0),0);

      const activeDays=monthly.filter(l=>l.water>0||(l.meals||[]).length>0||(l.exercise||[]).length>0).length;

      const lines=[
        `• Average daily water intake: ${avgWater} glasses`,
        `• Total workout days: ${workoutDays}`,
        `• Total exercise time: ${totalExMins} minutes`,
        `• Total calories burned: ${totalCalBurned} kcal`,
        `• Monthly consistency: ${Math.round((activeDays/30)*100)}%`,
      ];
      lines.forEach(l=>{doc.text(l,15,y);y+=7;});
    }

    y+=5;
    // Personal bests
    if(bests){
      doc.setTextColor(15,23,42);
      doc.setFontSize(14);doc.setFont('helvetica','bold');
      doc.text('Personal Bests (All Time)',15,y);y+=8;
      doc.setFontSize(10);doc.setFont('helvetica','normal');
      doc.setTextColor(71,85,105);
      const lines=[
        `• Longest streak: ${bests.longestStreak} days`,
        `• Best hydration day: ${bests.bestWater?.value||0} glasses`,
        `• Most exercise in a day: ${bests.bestExerciseMins?.value||0} minutes`,
        `• Most calories burned in a day: ${bests.bestCaloriesBurned?.value||0} kcal`,
        `• Total days logged: ${bests.totalDaysLogged}`,
      ];
      lines.forEach(l=>{doc.text(l,15,y);y+=7;});
    }

    // Footer
    doc.setTextColor(148,163,184);
    doc.setFontSize(9);
    doc.text('Generated by Wellness Tracker · Keep tracking, keep growing! 🌿',15,285);

    doc.save(`wellness-report-${TODAY}.pdf`);
  }catch(e){alert('PDF export failed: '+e.message);}
  if(btn){btn.textContent='⬇ Export PDF';btn.disabled=false;}
}

        <div class="row">
          <div class="row" style="gap:5px;font-size:11px;color:${state.sseConnected?'#16a34a':'#d97706'}">
            <div style="width:6px;height:6px;border-radius:50%;background:currentColor"></div>
            ${state.sseConnected?'Live':'Polling'}
          </div>
          ${state.lastSync?`<span style="font-size:11px;color:var(--text3)">Synced ${state.lastSync}</span>`:''}

  const totalW=r.reduce((s,x)=>s+(x.log.water||0),0);
  const totalM=r.reduce((s,x)=>s+(x.log.meals?.length||0),0);
  const totalE=r.reduce((s,x)=>s+(x.log.exercise||[]).reduce((a,e)=>a+(e.duration||0),0),0);
  const stats=[
    {label:'Total users',val:r.length,color:'#7c3aed'},
    {label:'Active today',val:`${active}/${r.length}`,color:'#16a34a'},
    {label:'Water glasses',val:totalW,color:'#0284c7'},
    {label:'Meals logged',val:totalM,color:'#0d9488'},
    {label:'Exercise mins',val:totalE,color:'#d97706'},
  ];
  return`
  <div class="col">
    <div class="grid grid-4" style="grid-template-columns:repeat(auto-fit,minmax(120px,1fr))">
      ${stats.map(s=>`<div style="background:var(--surface2);border-radius:var(--radius);padding:14px 15px">
        <div style="font-size:22px;font-weight:600;color:${s.color}">${s.val}</div>

      <div style="font-size:13px;color:var(--text2);line-height:1.6">All user writes broadcast instantly via SSE. Data is server-authoritative. All /dev/* endpoints enforce role=dev JWT server-side.</div>

      const hasData=log.water>0||(log.meals?.length>0)||(log.exercise?.length>0);
      const mCal=(log.meals||[]).reduce((s,m)=>s+(m.calories||0),0);
      const eMin=(log.exercise||[]).reduce((s,e)=>s+(e.duration||0),0);

      return`<div class="card">
        <div class="row" style="margin-bottom:14px;padding-bottom:13px;border-bottom:1px solid var(--border)">
          <div class="avatar" style="background:#7c3aed18;color:#7c3aed">${escHtml(u.name[0].toUpperCase())}</div>

        </div>
        <div class="grid" style="grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
          ${[{l:'Water',v:`${log.water||0}/${WATER_GOAL}`,c:'#0284c7'},{l:'Meals',v:(log.meals||[]).length,s:mCal+'kcal',c:'#16a34a'},{l:'Exercise',v:eMin+'m',c:'#0d9488'},{l:'BMI',v:bmi?bmi.bmi.toFixed(1):'—',s:bmi?.category,c:bmiColor(bmi?.category)}].map(s=>`<div style="background:var(--surface2);border-radius:var(--radius);padding:9px 10px;text-align:center">
            <div style="font-size:15px;font-weight:600;color:${s.c}">${s.v}</div>

            <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px">${s.l}</div>
          </div>`).join('')}
        </div>
        <div class="bar-wrap" style="margin-bottom:10px"><div class="bar" style="width:${wPct}%;background:#0284c7;height:100%"></div></div>
        ${(log.meals||[]).length?`<div style="margin-bottom:8px"><div class="label" style="margin-bottom:4px">Meals</div><div style="display:flex;flex-wrap:wrap;gap:4px">${log.meals.map(m=>`<span style="padding:2px 8px;border-radius:5px;background:var(--surface2);border:1px solid var(--border);font-size:11px">${escHtml(m.name)} · ${m.calories}kcal</span>`).join('')}</div></div>`:''}
        ${(log.exercise||[]).length?`<div><div class="label" style="margin-bottom:4px">Exercise</div><div style="display:flex;flex-wrap:wrap;gap:4px">${log.exercise.map(e=>`<span style="padding:2px 8px;border-radius:5px;background:#0d948812;border:1px solid #0d948830;font-size:11px;color:#0d9488">${escHtml(e.type)} · ${e.duration}min</span>`).join('')}</div></div>`:''}
        ${!hasData?`<div style="text-align:center;font-size:12px;color:var(--text2);padding:6px 0">No data logged today.</div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

function bindDev(){
  document.querySelectorAll('[data-devtab]').forEach(el=>{el.addEventListener('click',()=>setState({devTab:+el.dataset.devtab}));});
  document.getElementById('logout-btn')?.addEventListener('click',doLogout);
  document.getElementById('dev-refresh')?.addEventListener('click',()=>loadDevReport().then(renderApp));
  document.querySelectorAll('.dev-pdf-btn').forEach(el=>{
    el.addEventListener('click', async () => {
      const uname = el.dataset.uname;
      const log = JSON.parse(el.dataset.log || '{}');
      const streak = parseInt(el.dataset.streak) || 0;
      const bmi = JSON.parse(el.dataset.bmi || 'null');
      await exportUserPDF(uname, log, streak, bmi);
    });
  });
  document.querySelectorAll('.dev-delete-btn').forEach(el=>{
    el.addEventListener('click',async()=>{
      const uid=el.dataset.uid,uname=el.dataset.uname;
      if(!confirm(`Delete user "${uname}"? This cannot be undone.`))return;
      try{await DEL('/dev/users/'+uid);await loadDevReport();renderApp();}
      catch(e){alert('Failed to delete: '+e.message);}
    });
  });
}

async function loadDevReport(){
  state.loading=true;
  try{const data=await GET('/dev/report');state.report=data||[];state.lastSync=new Date().toLocaleTimeString();}
  catch(e){console.error(e);}
  state.loading=false;
}

let sseInstance=null;
function startSSE(){
  if(sseInstance)sseInstance.close();
  const token=Auth.get();
  try{
    const es=new EventSource(`${API_BASE}/api/dev/events?token=${encodeURIComponent(token)}`);
    es.onopen=()=>{state.sseConnected=true;renderApp();};
    es.onmessage=()=>{loadDevReport().then(renderApp);};
    es.onerror=()=>{state.sseConnected=false;sseInstance=null;startSSEPoll();};
    sseInstance=es;
  }catch{startSSEPoll();}
}
let pollTimer=null;
function startSSEPoll(){
  clearInterval(pollTimer);
  pollTimer=setInterval(()=>{if(Auth.ok()&&Auth.isDev())loadDevReport().then(renderApp);},8000);
}

async function doLogout(){
  try{await DEL('/auth/logout');}catch{}
  Auth.clear();
  if(sseInstance){sseInstance.close();sseInstance=null;}
  clearInterval(pollTimer);
  setState({view:'auth',authMode:'login',authErr:'',tab:0,devTab:0,analyticsTab:0,log:{water:0,meals:[],exercise:[]},bmi:null,streak:0,report:[],weeklyLogs:[],monthlyLogs:[],bests:null});
}

function scheduleMidnightRefresh(){
  const now=new Date(),midnight=new Date(now);
  midnight.setHours(24,0,1,0);
  setTimeout(async()=>{
    if(Auth.ok()&&!Auth.isDev()){await loadUserData();renderApp();}
    scheduleMidnightRefresh();
  },midnight-now);
}
scheduleMidnightRefresh();
renderApp();

</script>
